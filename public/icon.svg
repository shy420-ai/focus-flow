<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#FFF5F0"/>

  <!-- Flow curve gradient -->
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8B5FF"/>
      <stop offset="50%" stop-color="#E8849D"/>
      <stop offset="100%" stop-color="#FFDAC1"/>
    </linearGradient>
  </defs>

  <!-- Scaled + recentered content (content native center ~= (269,260),
       canvas center = (256,256), scale 1.2 — bigger but with breathing room) -->
  <g transform="translate(256 256) scale(1.2) translate(-269 -260)">
    <!-- Flow curve (S-shape) -->
    <path d="M300 100 Q420 100 420 180 Q420 260 300 260 Q180 260 180 340 Q180 420 300 420"
          stroke="url(#flow)" stroke-width="32" fill="none" stroke-linecap="round"/>

    <!-- Check circle 1 (purple, checked) -->
    <circle cx="160" cy="140" r="42" fill="#9B7BB5"/>
    <path d="M140 140 L155 155 L182 128" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Check circle 2 (pink, checked) -->
    <circle cx="160" cy="260" r="42" fill="#E8849D"/>
    <path d="M140 260 L155 275 L182 248" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Check circle 3 (mint, unchecked) -->
    <circle cx="160" cy="380" r="42" fill="none" stroke="#56C6A0" stroke-width="6"/>

    <!-- Task lines -->
    <line x1="220" y1="140" x2="300" y2="140" stroke="#B8B5FF" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="220" y1="260" x2="290" y2="260" stroke="#E8849D" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="220" y1="380" x2="280" y2="380" stroke="#56C6A0" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
