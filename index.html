function renderGoalSection(type,emoji,title){
  const goals=getGoals();const key=goalKey(type);
  const items=goals[key]||[];
  const done=items.filter(x=>x.done).length;
  const pct=items.length?Math.round(done/items.length*100):0;
  let h='<div class="goal-section">';
  h+='<div class="goal-header"><span class="goal-header-title">'+emoji+' '+title+'</span><span class="goal-progress">'+done+'/'+items.length+' ('+pct+'%)</span></div>';
  if(items.length)h+='<div class="goal-bar"><div class="goal-bar-fill" style="width:'+pct+'%"></div></div>';
  items.forEach(g=>{
    h+='<div class="goal-item">';
    h+='<button class="goal-check'+(g.done?' done':'')+'" onclick="toggleGoal(\''+type+'\',\''+g.id+'\')">'+(g.done?'✓':'')+'</button>';
    h+='<div class="goal-text'+(g.done?' done':'')+'">'+g.text+'</div>';
    h+='<button class="goal-del" onclick="deleteGoal(\''+type+'\',\''+g.id+'\')">✕</button>';
    h+='</div>';
  });
  h+='<div class="goal-add-row">';
  h+='<input class="goal-add-input" id="goal-input-'+type+'" placeholder="목표 추가..." onkeydown="if(event.key===\'Enter\'&&!event.isComposing)addGoal(\''+type+'\')">';
  h+='<button class="goal-add-btn" onclick="addGoal(\''+type+'\')">+</button>';
  h+='</div></div>';
  return h;
}

function renderGoals(){
  const wrap=document.getElementById('goal-content');if(!wrap)return;
  const m=getMandala()||initMandala();
  const now=new Date();
  let h='';
  // Grid order: [0,1,2,3,center,4,5,6,7]
  const order=[0,1,2,3,'c',4,5,6,7];

  if(_mandalaView==='grid'){
    h+='<div style="font-size:14px;font-weight:700;color:var(--pd);margin-bottom:10px;text-align:center">🎯 '+now.getFullYear()+'년 만다라트</div>';
    h+='<div class="mandala-grid">';
    order.forEach(idx=>{
      if(idx==='c'){
        h+='<div class="mandala-cell center" onclick="editMandalaCell(\'center\')">'+(m.center||'핵심 목표<br>터치해서 입력')+'</div>';
      }else{
        const text=m.cells[idx];
        const subDone=m.subs[idx]?m.subs[idx].filter(x=>x.done).length:0;
        const subTotal=m.subs[idx]?m.subs[idx].length:0;
        const badge=subTotal?'<div style="font-size:9px;color:var(--pm);margin-top:3px">'+subDone+'/'+subTotal+'</div>':'';
        h+='<div class="mandala-cell'+(text?' has-text':' empty')+'" onclick="openMandalaSub('+idx+')">'+(text||'터치해서 입력')+badge+'</div>';
      }
    });
    h+='</div>';
    h+='<div style="font-size:10px;color:#aaa;text-align:center;margin-bottom:16px">셀 터치 → 세부 목표 보기 | 가운데 = 핵심 목표</div>';
    // Monthly & Weekly
    h+=renderGoalSection('month','📅',(now.getMonth()+1)+'월 목표');
    h+=renderGoalSection('week','⭐','이번 주 목표');
  }else{
    // Sub detail view
    const idx=_mandalaView;
    const title=m.cells[idx]||'세부 목표 '+(idx+1);

function getMyShareCode(){
  if(!_uid)return null;
  // Generate short code from uid
  let h=0;for(let i=0;i<_uid.length;i++){h=((h<<5)-h)+_uid.charCodeAt(i);h|=0;}
  return Math.abs(h).toString(36).toUpperCase().slice(0,6);
}

function toggleFriendPanel(){

async function addFriend(){
  const code=prompt('친구의 공유 코드를 입력해:');
  if(!code||!code.trim())return;
  const trimmed=code.trim().toUpperCase();
  if(!_uid){alert('로그인이 필요해요!');return;}
  // Find user by share code — search in Firestore
  try{
    const snap=await db.collection('users').where('shareCode','==',trimmed).get();
    if(snap.empty){alert('해당 코드의 사용자를 찾을 수 없어요');return;}
    const friendDoc=snap.docs[0];
    const friendUid=friendDoc.id;
    if(friendUid===_uid){alert('자기 자신은 추가할 수 없어!');return;}
    const friends=getFriends();
    if(friends.find(f=>f.uid===friendUid)){alert('이미 추가된 친구야!');return;}
    const fd=friendDoc.data();
    friends.push({uid:friendUid,code:trimmed,name:fd.displayName||'친구'});
    saveFriends(friends);
    // Save my share code to Firestore if not already
    await db.collection('users').doc(_uid).update({shareCode:getMyShareCode()});
    renderFriendPanel();
  }catch(e){alert('에러: '+e.message);}
}

async function removeFriend(uid){
  let friends=getFriends();
  friends=friends.filter(f=>f.uid!==uid);
  saveFriends(friends);
  renderFriendPanel();
}

function getWeekStart(){
  const d=new Date();const day=d.getDay()||7;
  d.setDate(d.getDate()-(day-1));d.setHours(0,0,0,0);return d;
}
function renderWeek(){
  const wrap=document.getElementById('week-content');if(!wrap)return;
  const weekStart=getWeekStart();
  const days=[];for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);days.push(d);}
  const today=todayStr();
  const dayLabels=['월','화','수','목','금','토','일'];
  let h='<div class="week-grid">';
  // Header row
  h+='<div class="week-header"></div>';
  days.forEach((d,i)=>{
    const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    const isToday=ds===today;
    h+='<div class="week-header'+(isToday?' today':'')+'">'+ dayLabels[i]+'<br>'+d.getDate()+'</div>';
  });
  // Time rows
  for(let t=START;t<START+HOURS;t++){
    h+='<div class="week-time">'+t+':00</div>';
    days.forEach((d,di)=>{
      const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      h+='<div class="week-cell" data-weekday="'+di+'" data-hour="'+t+'" data-date="'+ds+'">';
      // Find blocks at this hour
      const dayBlocks=blocks.filter(b=>b.date===ds&&!b.isBuf&&(b.type==='timeline'||!b.type));
      const recurBlocks=generateRecurringBlocks(ds).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===ds));
      const allB=[...dayBlocks,...recurBlocks];
      allB.forEach(b=>{
        if(Math.floor(b.startHour)===t){
          const top=Math.round((b.startHour-t)*28);
          const height=Math.max(Math.round(b.durHour*28),14);
          h+='<div class="week-block'+(b.done?' done':'')+'" style="top:'+top+'px;height:'+height+'px;background:'+getCatColorOrTheme(b)+'" onclick="viewDate=\''+ds+'\';switchView(\'tl\')" title="'+b.name+' '+fmtH(b.startHour)+'-'+fmtH(b.startHour+b.durHour)+'">'+b.name+'</div>';
        }
      });
      h+='</div>';
    });
  }
  h+='</div>';
  wrap.innerHTML=h;
}
function getCatColorOrTheme(b){
  if(b.category){const c=catColor(b.category);if(c&&c!=='#aaa')return c;}
  return'var(--pink)';
}

function dateToJDN(y,m,d){const a=Math.floor((14-m)/12);const yy=y+4800-a;const mm=m+12*a-3;return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;}
function getDayStem(y,m,d){const jdn=dateToJDN(y,m,d);return(jdn+49)%60%10;}
function getDayBranch(y,m,d){const jdn=dateToJDN(y,m,d);return(jdn+49)%60%12;}

function sajuRelation(myStemIdx,todayStemIdx){
  const myElem=Math.floor(myStemIdx/2);const todayElem=Math.floor(todayStemIdx/2);
  // 0=木,1=火,2=土,3=金,4=水
  if(myElem===todayElem)return'비겁';
  const gen=[[1],[2],[3],[4],[0]]; // 木→火,火→土,土→金,金→水,水→木
  const over=[[2],[3],[4],[0],[1]]; // 木→土,火→金,土→水,金→木,水→火
  if(gen[myElem][0]===todayElem)return'식상';
  if(over[myElem][0]===todayElem)return'재성';
  if(gen[todayElem]&&gen[todayElem][0]===myElem)return'인성';
  return'관성';
}

const DEFAULT_TAB_ORDER=['tl','week','cal','habit','goal','drop'];
const TAB_LABELS={tl:'일간',week:'주간',cal:'월별',habit:'습관',goal:'목표',drop:'드롭'};
function getTabOrder(){
  try{const s=localStorage.getItem('ff_tab_order');if(s){const arr=JSON.parse(s);if(arr.length>=6&&arr.includes('week'))return arr;}}catch{}

// Tab drag reorder
let _tabDragKey=null;
document.addEventListener('dragstart',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(!tab)return;
  _tabDragKey=tab.dataset.tabKey;
  e.dataTransfer.effectAllowed='move';
  tab.style.opacity='0.4';
});
document.addEventListener('dragend',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(tab)tab.style.opacity='1';
  document.querySelectorAll('.vtab.drag-over-tab').forEach(el=>el.classList.remove('drag-over-tab'));
  _tabDragKey=null;
});
document.addEventListener('dragover',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(!tab||!_tabDragKey)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.vtab.drag-over-tab').forEach(el=>el.classList.remove('drag-over-tab'));
  tab.classList.add('drag-over-tab');
});
document.addEventListener('drop',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(!tab||!_tabDragKey)return;
  e.preventDefault();
  const toKey=tab.dataset.tabKey;
  if(_tabDragKey===toKey)return;
  const order=getTabOrder();
  const fromIdx=order.indexOf(_tabDragKey);
  const toIdx=order.indexOf(toKey);
  if(fromIdx<0||toIdx<0)return;
  order.splice(fromIdx,1);
  order.splice(toIdx,0,_tabDragKey);
  saveTabOrder(order);
  renderViewTabs();
  _tabDragKey=null;
});
renderViewTabs();

function saveHabitLocal(){
  localStorage.setItem('ff_habits',JSON.stringify(habits));
  localStorage.setItem('ff_habitLogs',JSON.stringify(habitLogs));
  localStorage.setItem('ff_metrics',JSON.stringify(metrics));

}
function saveHabits(){saveHabitLocal();saveToFirestore();}

function addHabit(name){
  if(!name.trim())return;
  habits.push({id:Date.now(),name:name.trim(),createdAt:todayStr()});
  saveHabits();renderHabits();
}
function delHabit(id){
  habits=habits.filter(h=>h.id!==id);
  saveHabits();renderHabits();
}
function toggleHabitLog(habitId,dateStr){
  if(!habitLogs[dateStr])habitLogs[dateStr]={};
  habitLogs[dateStr][habitId]=!habitLogs[dateStr][habitId];
  saveHabits();renderHabits();
}
function getHabitStreak(habitId){
  let streak=0,d=todayStr();
  for(let i=0;i<365;i++){
    if(habitLogs[d]&&habitLogs[d][habitId]){streak++;d=addDays(d,-1);}
    else break;
  }
  return streak;
}
function getWeekDates(){
  const today=new Date(todayStr()+'T12:00:00');
  const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  return dates;
}
function getMonthDates(){
  const today=new Date(todayStr()+'T12:00:00');
  const y=today.getFullYear(),m=today.getMonth();
  const first=new Date(y,m,1);
  const fdow=first.getDay();
  const startOff=fdow===0?6:fdow-1;
  const start=new Date(first);start.setDate(first.getDate()-startOff);
  const dim=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((startOff+dim)/7)*7;
  const dates=[];
  for(let i=0;i<totalCells;i++){const d=new Date(start);d.setDate(start.getDate()+i);dates.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  return dates;
}

function addMetric(name,unit){

function delMetric(id){

}
function saveMetricVal(metricId,dateStr,val){

  const n=parseFloat(val);
  if(isNaN(n)){delete metricLogs[dateStr][metricId];}
  else{metricLogs[dateStr][metricId]=n;}
  saveHabits();renderHabits();
}
function getMetricLast14(metricId){
  const vals=[];
  let d=todayStr();
  for(let i=0;i<14;i++){
    const v=(metricLogs[d]&&metricLogs[d][metricId]!==undefined)?metricLogs[d][metricId]:null;
    vals.unshift({date:d,val:v});
    d=addDays(d,-1);
  }
  return vals;
}

  h+='<div class="habit-input-row">';
  h+='<input class="habit-input" id="habit-quick-input" placeholder="새 습관 추가... (Enter)" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){addHabit(this.value);this.value=\'\';}">';

  if(habits.length){

      h+='<div class="habit-item">';
      h+='<div class="habit-top">';

      h+='<span class="habit-name">'+hab.name+'</span>';
      if(streak>0) h+='<span class="habit-streak">&#128293; '+streak+'일 연속</span>';
      h+='<button class="habit-del" onclick="delHabit('+hab.id+')">&#128465;</button>';
      h+='</div>';
      // Week view
      h+='<div class="habit-week">';
      weekDates.forEach((wd,i)=>{
        const filled=habitLogs[wd]&&habitLogs[wd][hab.id];
        h+='<div style="display:flex;flex-direction:column;align-items:center;gap:1px">';
        h+='<div class="habit-week-label">'+weekDayLabels[i]+'</div>';
        h+='<div class="habit-week-cell'+(filled?' filled':'')+'" onclick="toggleHabitLog('+hab.id+',\''+wd+'\')" style="cursor:pointer"></div>';
        h+='</div>';
      });
      h+='</div>';
      h+='</div>';
    });
  }else{
    h+='<div style="text-align:center;color:#ccc;font-size:13px;padding:20px 0">아직 등록된 습관이 없어</div>';
  }

  // ===== 66일 챌린지 =====
  if(habits.length){
    h+='<div style="margin-top:16px;padding:14px;background:linear-gradient(135deg,var(--pl),#fff);border-radius:14px;border:1.5px solid var(--pink)">';
    h+='<div style="font-size:14px;font-weight:700;color:var(--pd);margin-bottom:10px">🏆 66일 챌린지 (주 5회 = 성공)</div>';
    habits.forEach(hab=>{
      const created=hab.createdAt||todayStr();
      const startDate=new Date(created+'T12:00:00');
      const now=new Date(todayStr()+'T12:00:00');
      const daysPassed=Math.max(0,Math.floor((now-startDate)/86400000));
      const totalDays=66;
      const progress=Math.min(daysPassed,totalDays);

      // Count weeks and success weeks (5+ days per week)
      let totalWeeks=Math.ceil(progress/7)||1;
      let successWeeks=0;
      let totalChecked=0;
      for(let w=0;w<totalWeeks;w++){
        let weekCount=0;
        for(let d=0;d<7;d++){
          const dayOffset=w*7+d;
          if(dayOffset>=progress)break;
          const dateStr=addDays(created,dayOffset);
          if(habitLogs[dateStr]&&habitLogs[dateStr][hab.id])weekCount++;
        }
        if(weekCount>=5)successWeeks++;
        totalChecked+=weekCount;
      }

      const pct=Math.round(progress/totalDays*100);
      const done=progress>=totalDays;

      // Flower growth system
      const FLOWERS=['🌱','🌿','☘️','🌷','🌸','🌺','💐'];
      // Net growth: +1 per success week, -1 per fail week
      let flowerLevel=0;
      for(let w=0;w<totalWeeks;w++){
        let wc=0;
        for(let d=0;d<7;d++){
          const off=w*7+d;if(off>=progress)break;
          const ds=addDays(created,off);
          if(habitLogs[ds]&&habitLogs[ds][hab.id])wc++;
        }
        if(wc>=5)flowerLevel=Math.min(flowerLevel+1,FLOWERS.length-1);
        else if(wc<3)flowerLevel=Math.max(flowerLevel-1,0);
      }
      if(done)flowerLevel=FLOWERS.length-1;
      const flower=FLOWERS[flowerLevel];
      const flowerName=['씨앗','새싹','줄기','봉오리','개화','만개','완성!'][flowerLevel];

      h+='<div style="margin-bottom:12px">';
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      h+='<div style="font-size:12px;font-weight:600;color:#555">'+hab.name+'</div>';
      h+='<div style="font-size:36px;line-height:1;transition:all .3s" id="flower-'+hab.id+'">'+flower+'</div>';
      h+='<div style="font-size:11px;color:var(--pd);font-weight:600">'+flowerName+'</div>';
      if(done)h+='<div style="font-size:11px;color:#1D9E75;font-weight:700">✅ 66일 달성!</div>';
      h+='</div>';

      // Flower stage indicator
      h+='<div style="display:flex;gap:4px;margin-bottom:8px;align-items:center">';
      FLOWERS.forEach((f,i)=>{
        const active=i<=flowerLevel;
        h+='<div style="font-size:'+(i===flowerLevel?'20px':'14px')+';opacity:'+(active?'1':'0.25')+';transition:all .3s'+(i===flowerLevel?';transform:scale(1.2)':'')+'">'+f+'</div>';
        if(i<FLOWERS.length-1)h+='<div style="width:8px;height:2px;background:'+(i<flowerLevel?'var(--pd)':'var(--pl)')+';border-radius:1px"></div>';
      });
      h+='</div>';

      // 66-day grid (dots)
      h+='<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px">';
      for(let i=0;i<totalDays;i++){
        const dateStr=addDays(created,i);
        const checked=habitLogs[dateStr]&&habitLogs[dateStr][hab.id];
        const isPast=i<progress;
        const isToday=i===daysPassed;
        if(checked){
          h+='<div style="width:14px;height:14px;font-size:10px;line-height:14px;text-align:center" title="Day '+(i+1)+'">🌸</div>';
        }else if(isToday){
          h+='<div style="width:14px;height:14px;border-radius:7px;background:var(--pink);font-size:7px;line-height:14px;text-align:center;color:#fff" title="오늘">♡</div>';
        }else{
          h+='<div style="width:14px;height:14px;border-radius:7px;background:'+(isPast?'var(--pink)':'var(--pl)')+';opacity:'+(isPast?'0.3':'1')+'" title="Day '+(i+1)+'"></div>';
        }
      }
      h+='</div>';
      // Progress bar
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<div style="flex:1;height:6px;background:var(--pl);border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--pd);border-radius:3px"></div></div>';
      h+='<span style="font-size:11px;color:var(--pd);font-weight:600;white-space:nowrap">'+progress+'/'+totalDays+'일</span>';
      h+='</div>';

      h+='</div>';

      // Summary
      if(twAvg!==null){
        let sumText='이번 주 평균 '+Math.round(twAvg*10)/10+(met.unit?' '+met.unit:'');
        if(lwAvg!==null){
          const diff=Math.round((twAvg-lwAvg)*10)/10;
          sumText+=' (지난주 대비 '+(diff>=0?'+':'')+diff+')';
        }
        h+='<div class="metric-summary">'+sumText+'</div>';
      }

      // Bar chart
      h+='<div class="metric-chart">';
      last14.forEach(item=>{
        const barH=item.val!==null?Math.max(4,((item.val-minVal)/range)*40+4):2;
        const dayLabel=item.date.slice(8);
        h+='<div class="metric-bar-wrap">';
        if(item.val!==null) h+='<div class="metric-bar-val">'+Math.round(item.val*10)/10+'</div>';
        h+='<div class="metric-bar'+(item.val===null?' empty':'')+'" style="height:'+barH+'px"></div>';
        h+='<div class="metric-bar-label">'+parseInt(dayLabel)+'</div>';
        h+='</div>';
      });
      h+='</div>';
      h+='</div>';
    });
  }else{
    h+='<div style="text-align:center;color:#ccc;font-size:13px;padding:20px 0">아직 등록된 기록이 없어</div>';
  }
  h+='</div>';

  // ===== Quick Memo (빠른 메모) =====
  h+='<div style="margin-top:16px;padding:14px;background:var(--pl);border-radius:14px;border:1.5px solid var(--pink)">';

  h+='</div>';

  wrap.innerHTML=h;
}

// ====== POMODORO TIMER (뽀모도로) ======
let POMO_WORK=25*60;
let POMO_BREAK=5*60;
let pomoSeconds=POMO_WORK;

function setPomoTime(workMin, breakMin){
  POMO_WORK=workMin*60;
  POMO_BREAK=(breakMin||5)*60;
  pomoSeconds=POMO_WORK;
  pomoPhase='work';
  pomoRunning=false;
  clearInterval(pomoInterval);
  updatePomoDisplay();
}
let pomoRunning=false;
let pomoInterval=null;
let pomoPhase='work'; // 'work' or 'break'
let pomoTodayCount=0;
let pomoCountDate=todayStr();

// Load pomodoro count from localStorage (Firebase sync handled separately)
(function loadPomoLocal(){
  const saved=JSON.parse(localStorage.getItem('ff_pomo')||'{}');
  if(saved.date===todayStr()){
    pomoTodayCount=saved.count||0;
  }
  pomoCountDate=todayStr();
})();

function savePomoLocal(){
  localStorage.setItem('ff_pomo',JSON.stringify({date:pomoCountDate,count:pomoTodayCount}));
}

function savePomoToFirestore(){
  if(!_uid)return;
  const dateKey='pomo_'+todayStr().replace(/-/g,'');
  const obj={};
  obj['pomodoroCount.'+todayStr()]=pomoTodayCount;
  _skipRemote=true;
  db.collection('users').doc(_uid).set(obj,{merge:true}).then(()=>{
    setTimeout(()=>{_skipRemote=false},1000);
  });
}

function togglePomoPanel(){
  const panel=document.getElementById('pomo-panel');
  panel.classList.toggle('show');
  updatePomoDisplay();
}

function updatePomoDisplay(){
  const m=Math.floor(pomoSeconds/60);
  const s=pomoSeconds%60;
  document.getElementById('pomo-time').textContent=pad(m)+':'+pad(s);
  document.getElementById('pomo-phase').textContent=pomoPhase==='work'?'집중 시간':'쉬는 시간';
  document.getElementById('pomo-start-btn').textContent=pomoRunning?'일시정지':'시작';

  const total=pomoPhase==='work'?POMO_WORK:POMO_BREAK;
  const pct=((total-pomoSeconds)/total)*100;
  document.getElementById('pomo-progress-bar').style.width=pct+'%';

  // Update gauge (desktop) — circular ring that drains as time passes
  const gauge=document.getElementById('pomo-gauge-fill');
  if(gauge){const circ=2*Math.PI*76;gauge.setAttribute('stroke-dashoffset',circ*(pct/100));}
  const gt=document.getElementById('pomo-gauge-time');if(gt)gt.textContent=pad(m)+':'+pad(s);
  const gp=document.getElementById('pomo-gauge-phase');if(gp)gp.textContent=pomoPhase==='work'?'집중 시간':'쉬는 시간';
  const ds=document.getElementById('pomo-desk-start');if(ds)ds.textContent=pomoRunning?'일시정지':'시작';

  // Update count display
  if(pomoCountDate!==todayStr()){pomoTodayCount=0;pomoCountDate=todayStr();savePomoLocal();}
  const countText='오늘 뽀모도로 '+pomoTodayCount+'회 완료 \uD83C\uDF45';
  document.getElementById('pomo-count').textContent=countText;
  const dc=document.getElementById('pomo-desk-count');if(dc)dc.textContent=countText;
}

function pomoStartPause(){
  if(pomoRunning){
    clearInterval(pomoInterval);
    pomoRunning=false;
  } else {
    pomoRunning=true;
    pomoInterval=setInterval(()=>{
      if(pomoSeconds<=0){
        clearInterval(pomoInterval);
        pomoRunning=false;
        pomoTimerDone();
        return;
      }
      pomoSeconds--;
      updatePomoDisplay();
    },1000);
  }
  updatePomoDisplay();
}

function pomoReset(){
  clearInterval(pomoInterval);
  pomoRunning=false;
  pomoPhase='work';
  pomoSeconds=POMO_WORK;
  updatePomoDisplay();
}

function pomoTimerDone(){
  // Play chime using Web Audio API
  try{
    const actx=new(window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99].forEach((freq,i)=>{
      const osc=actx.createOscillator();
      const gain=actx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.3,actx.currentTime+i*0.2);
      gain.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.2+0.5);
      osc.connect(gain);gain.connect(actx.destination);
      osc.start(actx.currentTime+i*0.2);
      osc.stop(actx.currentTime+i*0.2+0.5);
    });
  }catch(e){}

  if(pomoPhase==='work'){
    pomoTodayCount++;
    savePomoLocal();
    savePomoToFirestore();
    showToast('\uD83C\uDF45','뽀모도로 완료!','집중 잘했어! 잠깐 쉬자');
    // Start break
    pomoPhase='break';
    pomoSeconds=POMO_BREAK;
  } else {
    showToast('\uD83D\uDCAA','휴식 끝!','다시 집중해보자');
    pomoPhase='work';
    pomoSeconds=POMO_WORK;
  }
  updatePomoDisplay();
}

        h+='<div class="reward-input-wrap">';
        h+='<input class="reward-input" id="reward-input-'+b.id+'" placeholder="이거 끝내면? (예: 치킨, 넷플릭스 1화)" value="'+(b.reward||'')+'">';
        h+='<button class="reward-save-btn" onclick="setReward(\''+b.id+'\',document.getElementById(\'reward-input-'+b.id+'\').value)">저장</button>';
        h+='</div>';
      }
      h+='</div>';
      h+='<div class="inbox-actions">';
      h+='<button class="reward-btn" onclick="event.stopPropagation();rewardEditId='+(rewardEditId===b.id?'null':'\''+b.id+'\'')+';renderInbox();" title="보상 설정">\uD83C\uDF81</button>';
      if(!b.done){h+='<button class="inbox-act inbox-act-sched" onclick="moveInboxToTimeline(\''+b.id+'\')" title="오늘 배치">&#128197;</button>';}
      h+='<button class="inbox-act inbox-act-del" onclick="delInboxItem(\''+b.id+'\')" title="삭제">&#128465;</button>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div>';
  });

  if(!items.length&&emergencyTodo.length===0){
    h+='<div style="text-align:center;color:#ccc;font-size:13px;padding:40px 0;line-height:22px">아직 할일이 없어<br>위에서 빠르게 추가해봐</div>';
  }

  wrap.innerHTML=h;
};

// ====== PATCH: toggleInboxDone with reward support ======
const _origToggleInboxDone=toggleInboxDone;
toggleInboxDone=function(id){
  const b=blocks.find(x=>x.id===id);if(!b)return;
  const was=b.done;b.done=!b.done;save();renderInbox();
  if(!was&&b.done){
    if(b.reward){
      showToast('\uD83C\uDF81','보상 획득!',b.reward+' 먹을 시간!');
    } else {
      showDone();
    }
  }
};

// ====== PATCH: Firebase load/listen for new fields ======
const _origLoadFromFirestore=loadFromFirestore;
loadFromFirestore=function(){
  db.collection('users').doc(_uid).get().then(doc=>{
    if(doc.exists){
      const d=doc.data();
      if(d.tasks){
        blocks=d.tasks;
        migrateBlocks();
        localStorage.setItem('ff_v3',JSON.stringify(blocks));
      }
      if(d.habits) habits=d.habits;
      if(d.habitLogs) habitLogs=d.habitLogs;
      if(d.metrics) metrics=d.metrics;
      if(d.metricLogs) metricLogs=d.metricLogs;
      if(d.recurring){recurring=d.recurring;localStorage.setItem('ff_recurring',JSON.stringify(recurring));}
      if(d.emergencyTodo){emergencyTodo=d.emergencyTodo;saveEmergencyLocal();}
      if(d.pomodoroCount&&d.pomodoroCount[todayStr()]){
        pomoTodayCount=d.pomodoroCount[todayStr()];
        pomoCountDate=todayStr();
        savePomoLocal();
      }
      if(d.quickMemo!==undefined){_quickMemo=d.quickMemo||'';localStorage.setItem('ff_quickMemo',_quickMemo);const qm=document.getElementById('quick-memo-textarea');if(qm)qm.value=_quickMemo;}
      saveHabitLocal();
      render();
      applyMode();
    }
  }).catch(()=>{});
};

const _origListenFirestore=listenFirestore;
listenFirestore=function(){
  if(_unsub)_unsub();
  _unsub=db.collection('users').doc(_uid).onSnapshot(doc=>{
    if(_skipRemote)return;
    if(doc.exists){
      const d=doc.data();
      if(d.tasks){
        blocks=d.tasks;
        migrateBlocks();
        localStorage.setItem('ff_v3',JSON.stringify(blocks));
      }
      if(d.habits) habits=d.habits;
      if(d.habitLogs) habitLogs=d.habitLogs;
      if(d.metrics) metrics=d.metrics;
      if(d.metricLogs) metricLogs=d.metricLogs;
      if(d.recurring){recurring=d.recurring;localStorage.setItem('ff_recurring',JSON.stringify(recurring));}
      if(d.emergencyTodo){emergencyTodo=d.emergencyTodo;saveEmergencyLocal();}
      if(d.pomodoroCount&&d.pomodoroCount[todayStr()]){
        pomoTodayCount=d.pomodoroCount[todayStr()];
        pomoCountDate=todayStr();
        savePomoLocal();
      }
      if(d.quickMemo!==undefined){_quickMemo=d.quickMemo||'';localStorage.setItem('ff_quickMemo',_quickMemo);const qm=document.getElementById('quick-memo-textarea');if(qm)qm.value=_quickMemo;}
      saveHabitLocal();
      render();
      applyMode();
    }
  });
};

// ====== PATCH: migrateBlocks for reward field ======
const _origMigrate=migrateBlocks;
migrateBlocks=function(){
  blocks.forEach(b=>{
    if(!b.type) b.type=b.isBuf?'buffer':'timeline';
    if(!b.category) b.category='';
    if(b.deadline===undefined) b.deadline=null;
    if(b.priority===undefined) b.priority=null;
    if(b.reward===undefined) b.reward=null;
  });
};
migrateBlocks();

buildGrid();render();applyMode();
</script>
<script>if('serviceWorker' in navigator){
  const SW_VER='v18';
  if(localStorage.getItem('ff_sw_ver')!==SW_VER){
    // One-time: clear old caches + re-register SW
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
    }).then(()=>caches.keys()).then(keys=>{
      return Promise.all(keys.map(k=>caches.delete(k)));
    }).then(()=>{
      localStorage.setItem('ff_sw_ver',SW_VER);
      navigator.serviceWorker.register('sw.js');
    }).catch(()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
  }else{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}</script>
