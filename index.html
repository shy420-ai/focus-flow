<title>Focus Flow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden;width:100%;background:var(--pink)}
:root{--pink:#E8849D;--pl:#FDE8EF;--pm:#E8849D;--pd:#C45A78;--pt:#7A2A42}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--pl);min-height:100vh;margin:0;padding:0;overflow-x:hidden;-webkit-overflow-scrolling:touch}

.header{background:var(--pink);padding:48px 20px 16px;display:flex;justify-content:space-between;align-items:flex-end;position:sticky;top:0;z-index:100;padding-top:max(48px,env(safe-area-inset-top,48px))}
.header h1{font-size:22px;font-weight:700;color:#fff}
.header h1 span{opacity:.85}
.clock{font-size:20px;font-weight:700;color:#fff}
.today-label{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px}

.date-tabs{background:#fff;padding:10px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--pl);position:sticky;top:86px;z-index:99}
.date-tabs::-webkit-scrollbar{display:none}
.dtab{padding:6px 13px;border-radius:99px;border:1.5px solid var(--pl);font-size:12px;color:#aaa;white-space:nowrap;cursor:pointer;background:none;font-family:inherit}
.dtab.active{background:var(--pink);border-color:var(--pink);color:#fff;font-weight:600}

.view-tabs{background:#fff;padding:8px 12px;display:flex;gap:6px;border-bottom:1px solid var(--pl);position:sticky;top:140px;z-index:98;justify-content:center;overflow-x:auto;scrollbar-width:none}.view-tabs::-webkit-scrollbar{display:none}
.vtab{padding:7px 14px;border-radius:99px;border:1.5px solid var(--pl);font-size:12px;color:#aaa;cursor:pointer;background:none;font-family:inherit;font-weight:500;white-space:nowrap}
.vtab.active{background:var(--pink);border-color:var(--pink);color:#fff;font-weight:600}
.vtab[draggable=true]{cursor:grab}.vtab[draggable=true]:active{cursor:grabbing}
.vtab.drag-over-tab{border-left:3px solid var(--pd)}

.summary{display:none}
.chip{background:var(--pl);border:1px solid var(--pink);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--pd);font-weight:500}

/* -- 타임라인 -- */
.tl-wrap{padding:12px 16px;padding-bottom:120px}
.sec-label{font-size:10px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.timeline{display:flex;gap:0}
.time-col{width:44px;flex-shrink:0}
.time-tick{display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px}
.time-tick span{font-size:10px;color:var(--pm);margin-top:-6px;cursor:pointer;padding:4px 4px;border-radius:6px;border:1px dashed transparent;transition:all .15s}.time-tick span:active{background:var(--pl);color:var(--pd);border-color:var(--pink)}
.blocks-col{flex:1;position:relative}
.hour-line{position:absolute;left:0;right:0;border-top:1px solid var(--pink);opacity:0.55;pointer-events:none}
.now-line{position:absolute;left:0;right:0;height:2px;background:#E24B4A;pointer-events:none;z-index:20;box-shadow:0 0 4px rgba(226,75,74,.5)}
.now-dot{position:absolute;left:-5px;top:-5px;width:12px;height:12px;border-radius:50%;background:#E24B4A;box-shadow:0 0 6px rgba(226,75,74,.5)}
.now-lbl{position:absolute;right:4px;top:-9px;font-size:10px;font-weight:600;color:var(--pd)}
.empty-tl{position:absolute;top:80px;left:0;right:0;text-align:center;color:#ccc;font-size:13px;line-height:22px}

.block{position:absolute;left:3px;right:3px;border-radius:10px;cursor:pointer;user-select:none;overflow:hidden}
.block.past{opacity:.45}
.block.done-block{opacity:.5;background:#E8E8E8 !important;border-color:#ccc !important}.block.done-block .b-name{color:#888 !important;text-decoration:line-through}.block.done-block .b-time{color:#aaa !important}
.block.dragging{transform:scale(1.03);z-index:50;box-shadow:0 4px 16px color-mix(in srgb,var(--pink) 30%,transparent)}
.b-inner{padding:5px 9px;height:100%}
.b-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b-time{font-size:10px;margin-top:1px;opacity:.75}
.b-memo{font-size:9px;margin-top:1px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rh{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:28px;height:8px;cursor:ns-resize;z-index:5;display:flex;align-items:center;justify-content:center}.rh::after{content:'';display:block;width:20px;height:3px;background:rgba(255,255,255,.4);border-radius:2px}
.block-menu{position:absolute;top:0;left:0;right:40px;bottom:0;display:flex;gap:6px;z-index:200;opacity:0;pointer-events:none;transition:opacity .15s;flex-wrap:wrap;justify-content:center;align-items:center;background:rgba(255,255,255,.92);border-radius:10px;backdrop-filter:blur(4px)}
.block.menu-open .block-menu{opacity:1;pointer-events:all}
.bmb{padding:8px 14px;font-size:12px;font-weight:600;border-radius:99px;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;background:var(--pl);color:var(--pd)}
.bmb-done{background:var(--pink);color:#fff}
.bmb-done.undone{background:#eee;color:#aaa}
.bmb-memo{background:#fff;color:var(--pd);border:1px solid var(--pink)}
.bmb-del{background:#FFF0F0;color:#E24B4A}

.c-pink{background:var(--pink);border:none;border-left:4px solid var(--pd)}.c-pink .b-name{color:#fff}.c-pink .b-time{color:rgba(255,255,255,.8)}
.c-red{background:var(--pd);border:none;border-left:4px solid var(--pt)}.c-red .b-name{color:#fff}.c-red .b-time{color:rgba(255,255,255,.8)}
.c-amb{background:color-mix(in srgb,var(--pink) 85%,var(--pd));border:none;border-left:4px solid var(--pd)}.c-amb .b-name{color:#fff}.c-amb .b-time{color:rgba(255,255,255,.8)}
.c-blue{background:color-mix(in srgb,var(--pd) 80%,var(--pt));border:none;border-left:4px solid var(--pt)}.c-blue .b-name{color:#fff}.c-blue .b-time{color:rgba(255,255,255,.8)}
.c-teal{background:color-mix(in srgb,var(--pink) 70%,var(--pl));border:none;border-left:4px solid var(--pd)}.c-teal .b-name{color:#fff}.c-teal .b-time{color:rgba(255,255,255,.8)}
.c-buf{background:#f5f5f5;border:1.5px dashed #ddd}.c-buf .b-name{color:#bbb;font-weight:400}
.b-quick{position:absolute;right:5px;top:50%;transform:translateY(-50%);display:flex;gap:3px;z-index:10}
.b-qbtn{width:18px;height:18px;border-radius:50%;border:1px solid var(--pl);background:#fff;color:var(--pd);font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.b-qbtn:active{transform:scale(.85);background:var(--pl)}
.b-qbtn-del{color:#ccc;border-color:#eee}.b-qbtn-del:active{color:#E24B4A}

/* -- Category tag on timeline blocks -- */
.b-cat-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-right:4px;vertical-align:middle;color:#fff;opacity:.9}

/* -- 캘린더 -- */
.cal-wrap{padding:12px 16px;padding-bottom:120px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:16px;font-weight:700;color:#333}
.cal-nav{width:36px;height:36px;border-radius:18px;border:1.5px solid var(--pl);background:transparent;font-size:22px;cursor:pointer;color:var(--pd);display:flex;align-items:center;justify-content:center;font-family:inherit}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow-cell{text-align:center;font-size:13px;font-weight:700;color:#bbb;padding:6px 0}
.dow-cell:first-child{color:#E24B4A}
.dow-cell:last-child{color:#378ADD}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--pl);border-radius:10px;overflow:hidden;padding:1px}
.cal-day{background:#fff;border-radius:8px;padding:6px 5px;min-height:80px;display:flex;flex-direction:column;align-items:flex-start;cursor:pointer;transition:background .12s;overflow:hidden}
.cal-day.other{opacity:.2}
.cal-day.sel{background:var(--pl)}
.cal-num{font-size:15px;font-weight:600;color:#333;width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:3px;flex-shrink:0;align-self:center}
.cal-num.sun{color:#E24B4A}
.cal-num.sat{color:#378ADD}
.cal-day.tod .cal-num{background:var(--pink);color:#fff;font-weight:700}
.cal-ev-chip{width:100%;font-size:9px;border-radius:4px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-preview{margin-top:2px;overflow:hidden}
.cal-pv-line{font-size:6px;line-height:8px;color:var(--pd);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.cal-pv-more{color:#aaa}
@media(max-width:380px){.cal-preview{display:none}}
.cal-detail{margin-top:14px;background:var(--pl);border-radius:14px;padding:12px 14px}
.cal-dlabel{font-size:11px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.cal-ev{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:6px;border-left:4px solid var(--pink)}
.cal-ev-time{font-size:11px;font-weight:600;margin-bottom:2px}
.cal-ev-name{font-size:13px;font-weight:600;color:#333}

/* -- FAB -- */
.fab{position:fixed;bottom:28px;right:22px;width:62px;height:62px;border-radius:31px;background:var(--pink);border:none;color:#fff;font-size:34px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px color-mix(in srgb,var(--pink) 50%,transparent);display:flex;align-items:center;justify-content:center;z-index:200}

/* -- Quick Schedule Menu -- */
.qs-overlay{position:fixed;inset:0;z-index:190;display:none}
.qs-overlay.show{display:block}
.qs-menu{position:fixed;bottom:100px;right:22px;display:flex;flex-direction:column;gap:6px;z-index:195;opacity:0;transform:translateY(20px);pointer-events:none;transition:opacity .2s ease,transform .25s cubic-bezier(.32,1,.32,1)}
.qs-menu.show{opacity:1;transform:translateY(0);pointer-events:all}
.qs-pill{padding:10px 18px;border-radius:99px;background:#fff;border:1.5px solid var(--pink);color:var(--pd);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;text-align:center;box-shadow:0 2px 10px color-mix(in srgb,var(--pink) 18%,transparent);transition:background .15s,color .15s}
.qs-pill:hover,.qs-pill:active{background:var(--pink);color:#fff}
.qs-input-row{position:fixed;bottom:100px;right:22px;display:flex;gap:6px;z-index:195;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .2s,transform .2s}
.qs-input-row.show{opacity:1;transform:translateY(0);pointer-events:all}
.qs-input{border:1.5px solid var(--pink);border-radius:14px;padding:10px 14px;font-size:14px;color:#333;font-family:inherit;outline:none;background:#fff;width:200px;box-shadow:0 2px 12px color-mix(in srgb,var(--pink) 20%,transparent)}
.qs-input::placeholder{color:#ccc}
.qs-submit{width:40px;height:40px;border-radius:12px;background:var(--pink);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px color-mix(in srgb,var(--pink) 30%,transparent)}

/* -- 시트 -- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 44px;z-index:301;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.32,1);max-height:90vh;overflow-y:auto}
.sheet.show{transform:translateY(0)}
.sh{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:16px;font-weight:700;color:#333;margin-bottom:14px}
.hints{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.hchip{background:var(--pl);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--pd);cursor:pointer;border:none;text-align:left;font-family:inherit}
.ri{width:100%;border:1.5px solid var(--pink);border-radius:14px;padding:14px;font-size:15px;color:#333;min-height:76px;resize:none;font-family:inherit;line-height:1.5;outline:none}
.pbtn{width:100%;background:var(--pink);border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:700;margin-top:10px;cursor:pointer;font-family:inherit}
.pbtn:disabled{opacity:.4}
.obtn{padding:7px 14px;border-radius:99px;border:1.5px solid var(--pl);background:transparent;font-size:13px;color:#aaa;cursor:pointer;font-family:inherit;margin-top:10px}
.obtn.on{background:var(--pl);border-color:var(--pink);color:var(--pd);font-weight:600}
.pbox{background:var(--pl);border:1.5px solid var(--pink);border-radius:14px;padding:14px;margin-top:12px}
.plabel{font-size:10px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.pblock{border-left:4px solid var(--pink);padding-left:12px;margin-bottom:10px}
.pdate{font-size:12px;font-weight:600;color:var(--pink);margin-bottom:3px}
.pname{font-size:16px;font-weight:700;color:#333}
.pdur{font-size:12px;color:#aaa;margin-top:2px}
.pbuf{background:#f3f3f3;border-radius:8px;padding:8px 10px;font-size:12px;color:#aaa;border:1px dashed #ddd;margin-bottom:12px}
.ar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.al{font-size:12px;color:var(--pd);font-weight:600;width:60px;flex-shrink:0}
.ai{flex:1;border:1.5px solid var(--pink);border-radius:8px;padding:6px 10px;font-size:13px;color:#333;font-family:inherit;outline:none;background:#fff}
.mi{width:100%;border:1.5px solid var(--pink);border-radius:8px;padding:8px 10px;font-size:13px;color:#333;font-family:inherit;outline:none;resize:none;background:#fff;margin-bottom:8px}
.cbtn{width:100%;background:var(--pink);border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:700;margin-top:8px;cursor:pointer;font-family:inherit}

/* -- Category pills for sheet -- */
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cat-pill{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #eee;background:#fff;color:#999;font-family:inherit;transition:all .15s}
.cat-pill.active{color:#fff;border-color:transparent}

/* -- 메모시트 -- */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:flex-end}
.moverlay.show{display:flex}
.msheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:20px 20px 44px}
.mbtns{display:flex;gap:8px;margin-top:10px}
.msave{flex:1;background:var(--pink);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.mcancel{background:#f5f5f5;border:none;border-radius:10px;padding:12px 16px;font-size:14px;cursor:pointer;font-family:inherit;color:#888}

/* -- 토스트 -- */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:#fff;border:2px solid var(--pink);border-radius:20px;padding:20px 30px;text-align:center;z-index:999;opacity:0;pointer-events:none;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.te{font-size:36px;display:block;margin-bottom:6px}
.tm{font-size:16px;font-weight:700;color:var(--pd)}
.ts{font-size:12px;color:#aaa;margin-top:3px}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:998}

/* ===== Inbox (Brain Dump) ===== */
.inbox-wrap{padding:12px 16px;padding-bottom:120px}
.inbox-input-row{display:flex;gap:8px;margin-bottom:16px}
.inbox-input{flex:1;border:1.5px solid var(--pink);border-radius:12px;padding:12px 14px;font-size:14px;color:#333;font-family:inherit;outline:none;background:#fff}
.inbox-input::placeholder{color:#ccc}
.inbox-add-btn{width:44px;height:44px;border-radius:12px;background:var(--pink);border:none;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.inbox-section{margin-bottom:20px}
.inbox-section-title{font-size:11px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.inbox-section-title .count{background:var(--pl);border-radius:99px;padding:1px 7px;font-size:10px;color:var(--pd)}
.inbox-item{background:#fff;border:1.5px solid var(--pl);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;position:relative}
.inbox-item.done-item{opacity:.35}
.inbox-item .inbox-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--pink);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--pink);font-family:inherit}
.inbox-item .inbox-check.checked{background:var(--pink);color:#fff}
.inbox-item .inbox-body{flex:1;min-width:0}
.inbox-item .inbox-name{font-size:13px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-item .inbox-meta{font-size:10px;color:#aaa;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.inbox-item .inbox-dday{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px}
.inbox-dday.urgent{background:#FCEBEB;color:#E24B4A}
.inbox-dday.soon{background:#FAEEDA;color:#854F0B}
.inbox-dday.normal{background:#E6F1FB;color:#185FA5}
.inbox-actions{display:flex;gap:4px;flex-shrink:0}
.inbox-act{width:28px;height:28px;border-radius:8px;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.inbox-act-sched{background:var(--pl);color:var(--pd)}
.inbox-act-del{background:#FFF0F0;color:#E24B4A}
.inbox-priority-pills{display:flex;gap:4px;margin-top:6px}
.inbox-pri-pill{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #eee;background:#fff;color:#aaa;font-family:inherit;transition:all .12s}
.inbox-pri-pill.active{border-color:var(--pink);background:var(--pl);color:var(--pd)}

/* Smart Today section */
.smart-today{background:linear-gradient(135deg,var(--pl) 0%,#fff 100%);border:1.5px solid var(--pink);border-radius:14px;padding:12px 14px;margin-bottom:16px}
.smart-today-title{font-size:12px;font-weight:700;color:var(--pd);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.smart-today-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid color-mix(in srgb,var(--pink) 15%,transparent)}
.smart-today-item:last-child{border-bottom:none}
.smart-today-name{flex:1;font-size:12px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smart-today-dday{font-size:10px;font-weight:700;color:#E24B4A}
.smart-today-btn{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;background:var(--pink);color:#fff;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}

/* Inbox cat filter */
.inbox-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

/* Deadline input in inbox */
.inbox-extra-row{display:flex;gap:6px;align-items:center;margin-top:6px;margin-bottom:10px;flex-wrap:wrap}
.inbox-extra-row label{font-size:11px;color:var(--pd);font-weight:600}
.inbox-extra-row input[type=date]{border:1.5px solid var(--pink);border-radius:8px;padding:4px 8px;font-size:12px;color:#333;font-family:inherit;outline:none;background:#fff}

/* Desktop 2-column layout */
.desktop-layout{display:block}
@media(min-width:768px){
  html,body{overflow-x:hidden}
  .desktop-layout{display:flex;gap:0;width:100%}
  .desktop-left{width:40%;flex-shrink:0;flex-grow:0}
  .desktop-right{width:60%;flex-shrink:0;flex-grow:0;border-left:1px solid var(--pl);position:sticky;top:140px;height:calc(100vh - 140px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:color-mix(in srgb,var(--pink) 30%,transparent) transparent}
  .desktop-right::-webkit-scrollbar{width:6px}
  .desktop-right::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--pink) 30%,transparent);border-radius:3px}
  .desktop-right::-webkit-scrollbar-track{background:transparent}
  #view-cal.desktop-right{display:block}
  #view-inbox{display:none !important}
  .view-tabs{display:flex !important}
}
@keyframes petalFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(40px) rotate(180deg)}}
.petal-fall{animation:petalFall 1.5s ease-out forwards;position:absolute;font-size:14px;pointer-events:none}
#login-overlay{position:fixed;inset:0;background:#FFF5F8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#login-overlay h1{font-size:28px;color:var(--pink);font-weight:700}
#login-overlay p{color:#aaa;font-size:14px}
#login-overlay button{padding:14px 32px;border-radius:12px;border:none;background:var(--pink);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
#login-overlay button:hover{background:var(--pd)}
#login-overlay .avatar{width:40px;height:40px;border-radius:50%;margin-top:12px}

/* ===== Habit Tracker (습관) ===== */
.habit-wrap{padding:12px 16px;padding-bottom:120px}
.drop-wrap{padding:16px}
.drop-input-row{display:flex;gap:8px;margin-bottom:12px}
.drop-input{flex:1;border:1.5px solid var(--pink);border-radius:12px;padding:12px 14px;font-size:14px;color:#333;font-family:inherit;outline:none;background:#fff}
.drop-input::placeholder{color:#ccc}
.drop-add-btn{width:44px;height:44px;border-radius:12px;background:var(--pink);border:none;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.drop-actions{display:flex;gap:8px;margin-bottom:16px}
.drop-action-btn{padding:8px 14px;border-radius:10px;border:1.5px solid var(--pink);background:#fff;color:var(--pd);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.drop-item{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;border-radius:12px;margin-bottom:8px;border-left:4px solid var(--pink);transition:all .2s}
.drop-item.done{opacity:.4;border-left-color:#ccc}
.drop-item .drop-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--pink);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--pink);font-family:inherit}
.drop-item.done .drop-check{border-color:#ccc;color:#ccc}
.drop-item .drop-name{flex:1;font-size:14px;color:#333}
.drop-item.done .drop-name{text-decoration:line-through;color:#aaa}
.drop-item[draggable=true]{cursor:grab}.drop-item[draggable=true]:active{cursor:grabbing}
.drop-item.drag-over{border-top:2px solid var(--pink);margin-top:-2px}
.drop-item .drop-del{width:32px;height:32px;border-radius:8px;border:none;background:rgba(0,0,0,.04);color:#aaa;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drop-empty{text-align:center;color:#bbb;font-size:13px;padding:60px 20px;line-height:1.8}
.habit-input-row{display:flex;gap:8px;margin-bottom:16px}
.habit-input{flex:1;border:1.5px solid var(--pink);border-radius:12px;padding:12px 14px;font-size:14px;color:#333;font-family:inherit;outline:none;background:#fff}
.habit-input::placeholder{color:#ccc}
.habit-add-btn{width:44px;height:44px;border-radius:12px;background:var(--pink);border:none;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.habit-section-title{font-size:11px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.week-grid{display:grid;grid-template-columns:40px repeat(7,1fr);font-size:10px;min-width:500px}
.week-header{text-align:center;font-weight:700;color:var(--pd);padding:6px 2px;border-bottom:1.5px solid var(--pl);font-size:11px}
.week-header.today{background:var(--pink);color:#fff;border-radius:8px 8px 0 0}
.week-time{color:#bbb;font-size:9px;text-align:right;padding-right:4px;height:28px;line-height:28px;border-top:1px solid var(--pl)}
.week-cell{border-top:1px solid var(--pl);border-left:1px solid var(--pl);height:28px;position:relative}
.week-block{position:absolute;left:1px;right:1px;background:var(--pink);border-radius:4px;padding:1px 3px;font-size:8px;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;z-index:2;cursor:pointer;line-height:1.2}
.week-block.done{opacity:.4;text-decoration:line-through}
.mandala-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px}
.mandala-cell{background:#fff;border:1.5px solid var(--pl);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;font-size:11px;color:#555;min-height:60px;display:flex;align-items:center;justify-content:center;word-break:keep-all;line-height:1.3;transition:all .15s}
.mandala-cell.center{background:var(--pink);color:#fff;font-weight:700;font-size:13px;border-color:var(--pink)}
.mandala-cell.active{border-color:var(--pd);background:var(--pl);font-weight:600;color:var(--pd)}
.mandala-cell.has-text{color:var(--pd);font-weight:500}
.mandala-cell.empty{color:#ccc;font-style:italic}
.mandala-detail{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;border:1.5px solid var(--pl)}
.mandala-detail-title{font-size:14px;font-weight:700;color:var(--pd);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mandala-detail-back{background:none;border:none;font-size:16px;cursor:pointer;color:var(--pd);padding:2px 6px}
.goal-section{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;border:1.5px solid var(--pl)}
.goal-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:8px}
.goal-header-title{font-size:13px;font-weight:700;color:var(--pd)}
.goal-progress{font-size:11px;color:var(--pm)}
.goal-bar{height:4px;background:var(--pl);border-radius:2px;margin-bottom:10px;overflow:hidden}
.goal-bar-fill{height:100%;background:var(--pink);border-radius:2px;transition:width .3s}
.goal-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--pl)}
.goal-item:last-child{border-bottom:none}
.goal-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--pink);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--pink)}
.goal-check.done{background:var(--pink);color:#fff;border-color:var(--pink)}
.goal-text{flex:1;font-size:13px;color:#333}
.goal-text.done{text-decoration:line-through;color:#aaa}
.goal-del{background:none;border:none;color:#ccc;font-size:12px;cursor:pointer;padding:4px}
.goal-add-row{display:flex;gap:6px;margin-top:8px}
.goal-add-input{flex:1;border:1px solid var(--pl);border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;outline:none}
.goal-add-btn{width:28px;height:28px;border-radius:8px;background:var(--pink);border:none;color:#fff;font-size:14px;cursor:pointer}
.habit-item{background:#fff;border:1.5px solid var(--pl);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.habit-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.habit-check{width:28px;height:28px;border-radius:8px;border:2px solid var(--pink);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--pink);font-family:inherit;transition:all .15s}
.habit-check.checked{background:var(--pink);color:#fff}
.habit-name{flex:1;font-size:14px;font-weight:600;color:#333}
.habit-streak{font-size:11px;color:var(--pd);font-weight:600;white-space:nowrap}
.habit-del{width:24px;height:24px;border-radius:6px;border:none;background:#FFF0F0;color:#E24B4A;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.habit-week{display:flex;gap:3px;align-items:center}
.habit-week-label{font-size:9px;color:#bbb;width:16px;text-align:center;flex-shrink:0}
.habit-week-cell{width:20px;height:20px;border-radius:10px;background:var(--pl);flex-shrink:0;transition:all .2s;font-size:10px;line-height:20px;text-align:center}
.habit-week-cell.filled{background:var(--pink);box-shadow:0 1px 4px color-mix(in srgb,var(--pink) 40%,transparent)}
.habit-week-cell.filled::after{content:'🌸';font-size:12px}

/* Habit heatmap */
.habit-heatmap-section{margin-top:20px}
.heatmap-title{font-size:11px;font-weight:700;color:var(--pm);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.heatmap-dow{font-size:9px;color:#bbb;text-align:center;padding:2px 0}
.heatmap-cell{aspect-ratio:1;border-radius:3px;background:#f0f0f0}
.heatmap-cell.l1{background:#FDDDE6}
.heatmap-cell.l2{background:#F5A6B8}
.heatmap-cell.l3{background:#E8849D}
.heatmap-cell.l4{background:#C45A78}
.heatmap-cell.today-cell{outline:2px solid var(--pd);outline-offset:-1px}
.heatmap-summary{font-size:12px;color:var(--pd);font-weight:600;margin-top:6px;text-align:center}

/* ===== Metrics Tracker (기록) ===== */
.metrics-section{margin-top:28px;border-top:1.5px solid var(--pl);padding-top:20px}
.metric-add-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.metric-add-row input{flex:1;min-width:80px;border:1.5px solid var(--pink);border-radius:10px;padding:8px 12px;font-size:13px;color:#333;font-family:inherit;outline:none;background:#fff}
.metric-add-row input::placeholder{color:#ccc}
.metric-add-btn{padding:8px 14px;border-radius:10px;background:var(--pink);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.metric-item{background:#fff;border:1.5px solid var(--pl);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.metric-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.metric-label{flex:1;font-size:14px;font-weight:600;color:#333}
.metric-unit{font-size:11px;color:#aaa}
.metric-del{width:24px;height:24px;border-radius:6px;border:none;background:#FFF0F0;color:#E24B4A;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.metric-input-row{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.metric-val-input{width:80px;border:1.5px solid var(--pink);border-radius:8px;padding:6px 10px;font-size:13px;color:#333;font-family:inherit;outline:none;background:#fff}
.metric-save-btn{padding:6px 12px;border-radius:8px;background:var(--pink);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.metric-summary{font-size:11px;color:var(--pd);font-weight:600;margin-bottom:6px}
.metric-chart{display:flex;gap:2px;align-items:flex-end;height:48px}
.metric-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.metric-bar{width:100%;border-radius:3px 3px 0 0;background:var(--pink);min-height:2px;transition:height .2s}
.metric-bar.empty{background:#f0f0f0}
.metric-bar-label{font-size:7px;color:#bbb}
.metric-bar-val{font-size:7px;color:var(--pd);font-weight:600}

/* ===== Recurring Toggle ===== */
.recur-section{margin-top:10px;margin-bottom:8px}
.recur-toggle{display:flex;align-items:center;gap:8px}
.recur-toggle-label{font-size:12px;font-weight:600;color:#aaa}
.recur-toggle-label.on{color:var(--pd)}
.recur-switch{width:44px;height:24px;border-radius:12px;background:#ddd;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;padding:0}
.recur-switch.on{background:var(--pink)}
.recur-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.recur-switch.on::after{transform:translateX(20px)}
.recur-days{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.recur-day-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #eee;background:#fff;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;font-family:inherit;transition:all .15s}
.recur-day-btn.active{background:var(--pink);border-color:var(--pink);color:#fff}
.recur-day-btn.sun{color:#E24B4A;border-color:#fdd}
.recur-day-btn.sat{color:#378ADD;border-color:#ddf}
.recur-day-btn.active.sun,.recur-day-btn.active.sat{color:#fff}
.recur-icon{font-size:10px;margin-left:3px;opacity:.7}

/* Desktop: habits/drop use desktop-right class dynamically */

/* ===== Pomodoro Timer ===== */
.pomo-fab{position:fixed;bottom:28px;left:22px;width:54px;height:54px;border-radius:27px;background:var(--pink);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 16px color-mix(in srgb,var(--pink) 50%,transparent);display:flex;align-items:center;justify-content:center;z-index:200}
.pomo-panel{position:fixed;bottom:90px;left:16px;width:260px;background:#fff;border:2px solid var(--pink);border-radius:20px;padding:20px;z-index:201;box-shadow:0 8px 32px color-mix(in srgb,var(--pink) 25%,transparent);display:none}
.pomo-panel.show{display:block}
.pomo-title{font-size:13px;font-weight:700;color:var(--pd);margin-bottom:12px;text-align:center}
.pomo-display{text-align:center;margin-bottom:12px}
.pomo-time{font-size:48px;font-weight:700;color:var(--pd);font-variant-numeric:tabular-nums;letter-spacing:-2px}
.pomo-phase{font-size:12px;color:var(--pm);font-weight:600;margin-top:4px}
.pomo-progress{width:100%;height:6px;background:var(--pl);border-radius:3px;overflow:hidden;margin-bottom:14px}
.pomo-progress-bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--pd));border-radius:3px;transition:width .5s}
.pomo-gauge-wrap{display:flex;justify-content:center;margin-bottom:12px}
.pomo-gauge{position:relative;width:180px;height:180px}
.pomo-gauge svg{transform:rotate(-90deg)}
.pomo-gauge-bg{fill:none;stroke:var(--pl);stroke-width:12}
.pomo-gauge-fill{fill:none;stroke:var(--pd);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pomo-gauge-info{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-gauge-time{font-size:38px;font-weight:700;color:var(--pd);font-variant-numeric:tabular-nums;letter-spacing:-2px}
.pomo-gauge-phase{font-size:11px;color:var(--pm);font-weight:600;margin-top:2px}
@media(min-width:768px){
  .pomo-desktop{display:block;padding:8px 16px;border-bottom:1px solid var(--pl)}
  .pomo-desktop .pomo-gauge-wrap{margin-bottom:4px;transform:scale(0.55);transform-origin:center top;height:105px}
  .pomo-fab,.pomo-panel{display:none !important}
}
@media(max-width:767px){
  .pomo-desktop{display:none}
}

.emergency-del{width:24px;height:24px;border-radius:6px;border:none;background:rgba(226,75,74,.12);color:#E24B4A;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emergency-input-row{display:flex;gap:6px;margin-top:8px}
.emergency-complete-msg{text-align:center;padding:12px 0;font-size:14px;color:#E24B4A;font-weight:700}

/* ===== Mode Toggle ===== */
.mode-toggle{display:flex;gap:0;background:var(--pl);border-radius:99px;padding:2px;margin-left:auto;margin-right:8px}
.mode-btn{padding:4px 12px;border-radius:99px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:#aaa;transition:all .15s;white-space:nowrap}

let _loginBusy=false;
function doEmailLogin(){
  if(_loginBusy)return;
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!email||!pw){showLoginError('이메일과 비밀번호를 입력해주세요');return;}
  if(pw.length<6){showLoginError('비밀번호는 6자 이상이어야 해요');return;}
  _loginBusy=true;
  const btn=document.getElementById('login-btn');
  if(btn){btn.textContent='로그인 중...';btn.disabled=true;}
  // Try login first, if user doesn't exist → sign up
  auth.signInWithEmailAndPassword(email,pw).catch(e=>{
    if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'){
      // New user → create account
      return auth.createUserWithEmailAndPassword(email,pw);
    }
    throw e;
  }).then(()=>{
    // Success — onAuthStateChanged handles the rest
  }).catch(e=>{
    _loginBusy=false;
    if(btn){btn.textContent='로그인 / 회원가입';btn.disabled=false;}
    const msgs={'auth/invalid-email':'이메일 형식이 올바르지 않아요','auth/wrong-password':'비밀번호가 틀렸어요','auth/email-already-in-use':'이미 가입된 이메일이에요. 비밀번호를 확인해주세요','auth/weak-password':'비밀번호가 너무 짧아요 (6자 이상)','auth/too-many-requests':'너무 많이 시도했어요. 잠시 후 다시 해주세요','auth/invalid-credential':'비밀번호가 틀렸어요'};
    showLoginError(msgs[e.code]||'로그인 실패: '+e.message);
  });
}
function showLoginError(msg){
  const el=document.getElementById('login-error');
  if(el){el.textContent=msg;el.style.display='block';}
}
function doLogin(){
  if(_loginBusy)return;
  _loginBusy=true;
  const btn=document.getElementById('google-btn');
  if(btn){btn.textContent='로그인 중...';btn.disabled=true;}
  const provider=new firebase.auth.GoogleAuthProvider();
  // Call signInWithPopup directly (synchronous with click = not blocked)
  auth.signInWithPopup(provider).then(result=>{
    // Success handled by onAuthStateChanged
  }).catch(e=>{
    _loginBusy=false;
    if(btn){btn.textContent='Google 로그인';btn.disabled=false;}
    if(e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request'){
      // User closed popup or double clicked — just reset
    }else if(e.code==='auth/popup-blocked'){
      showLoginError('팝업이 차단됐어요. 브라우저 설정에서 팝업을 허용해주세요.');
    }else if(e.code==='auth/unauthorized-domain'){
      showLoginError('이 도메인에서 로그인이 허용되지 않았어요. "바로 시작하기"를 이용해주세요.');
    }else if(e.message&&e.message.includes('disallowed_useragent')){
      showLoginError('인앱 브라우저에서는 Google 로그인이 안 돼요! Chrome이나 Safari로 열어주세요.');
    }else{
      showLoginError('로그인 실패: '+(e.message||'알 수 없는 에러'));
    }
  });
}
// Handle redirect result (legacy)
auth.getRedirectResult().catch(e=>{
  if(e.message&&e.message.includes('disallowed_useragent')){
    showLoginError('인앱 브라우저에서는 Google 로그인이 안 돼요! Chrome이나 Safari로 열어주세요.');
  }else if(e.code&&e.code!=='auth/popup-closed-by-user'){
    showLoginError('로그인 실패: '+(e.message||''));
  }
});
// Skip login — work offline with localStorage. Sync when logged in.
function startWithoutLogin(){
  localStorage.setItem('ff_skip_login','1');
  document.getElementById('login-overlay').style.display='none';
  viewDate=todayStr();curView='tl';
  switchView('tl');
}
// If previously logged in, hide overlay immediately to prevent flash
if(localStorage.getItem('ff_uid')||localStorage.getItem('ff_skip_login')){
  document.getElementById('login-overlay').style.display='none';
}
auth.onAuthStateChanged(user=>{
  if(user){
    _uid=user.uid;
    localStorage.setItem('ff_uid',user.uid);
    localStorage.removeItem('ff_skip_login');
    document.getElementById('login-overlay').style.display='none';
    viewDate=todayStr();curView=localStorage.getItem('ff_cur_view')||'tl';
    loadFromFirestore();
    listenFirestore();
    // Save share code for friend feature
    const sc=getMyShareCode();
    if(sc)db.collection('users').doc(_uid).set({shareCode:sc,displayName:user.displayName||''},{merge:true}).catch(()=>{});
    switchView('tl');
  }else if(localStorage.getItem('ff_skip_login')||localStorage.getItem('ff_uid')){
    // Previously logged in or skipped — don't show login, load from local
    document.getElementById('login-overlay').style.display='none';
    viewDate=todayStr();curView=localStorage.getItem('ff_cur_view')||'tl';
    switchView('tl');
  }else{
    document.getElementById('login-overlay').style.display='flex';
  }
});
function loadFromFirestore(){
  db.collection('users').doc(_uid).get().then(doc=>{
    if(doc.exists){
      const d=doc.data();
      if(d.tasks){
        blocks=d.tasks;
        migrateBlocks();
        localStorage.setItem('ff_v3',JSON.stringify(blocks));
      }
      if(d.habits) habits=d.habits;
      if(d.habitLogs) habitLogs=d.habitLogs;
      if(d.metrics) metrics=d.metrics;
      if(d.metricLogs) metricLogs=d.metricLogs;
      saveHabitLocal();
      render();
    }
  }).catch(()=>{});
}
function saveToFirestore(){
  if(!_uid)return;
  _skipRemote=true;
  db.collection('users').doc(_uid).set({
    tasks:blocks,
    recurring:recurring,
    habits:habits,
    habitLogs:habitLogs,
    metrics:metrics,
    metricLogs:metricLogs,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).then(()=>{
    setTimeout(()=>{_skipRemote=false},1000);
  });
}
function listenFirestore(){
  if(_unsub)_unsub();
  _unsub=db.collection('users').doc(_uid).onSnapshot(doc=>{
    if(_skipRemote)return;
    if(doc.exists){
      const d=doc.data();
      if(d.tasks){
        blocks=d.tasks;
        migrateBlocks();
        localStorage.setItem('ff_v3',JSON.stringify(blocks));
      }
      if(d.habits) habits=d.habits;
      if(d.habitLogs) habitLogs=d.habitLogs;
      if(d.metrics) metrics=d.metrics;
      if(d.metricLogs) metricLogs=d.metricLogs;
      if(d.drops) localStorage.setItem('ff_drops',JSON.stringify(d.drops));
      if(d.goals) localStorage.setItem('ff_goals',JSON.stringify(d.goals));
      if(d.mandala) localStorage.setItem('ff_mandala',JSON.stringify(d.mandala));
      if(d.friends) localStorage.setItem('ff_friends',JSON.stringify(d.friends));
      saveHabitLocal();
      render();
    }
  });
}

function migrateBlocks(){
  blocks.forEach(b=>{
    if(!b.type) b.type=b.isBuf?'buffer':'timeline';

    if(b.deadline===undefined) b.deadline=null;

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtH(h){return Math.floor(h)+':'+(h%1?'30':'00');}
function nowH(){const n=new Date();return n.getHours()+n.getMinutes()/60;}
function hToY(h){return (h-START)*PX;}
function getDow(ds){return DAYS[new Date(ds+'T12:00:00').getDay()];}
function dateLabel(ds){
  const today=todayStr(),diff=Math.round((new Date(ds+'T12:00:00')-new Date(today+'T12:00:00'))/86400000),dow=getDow(ds);
  const[,m,d]=ds.split('-');
  if(diff===0)return '오늘('+dow+')';if(diff===1)return '내일('+dow+')';if(diff===2)return '모레('+dow+')';if(diff===-1)return '어제('+dow+')';
  return parseInt(m)+'/'+parseInt(d)+'('+dow+')';
}
function pickColor(days){if(days<0)return 'red';if(days<=2)return 'amb';if(days<=7)return 'pink';return 'blue';}
function save(){localStorage.setItem('ff_v3',JSON.stringify(blocks));saveToFirestore();}
function saveRecurring(){localStorage.setItem('ff_recurring',JSON.stringify(recurring));saveToFirestore();}
function getRecurringForDate(ds){
  const dow=new Date(ds+'T12:00:00').getDay();
  return recurring.filter(r=>r.days.includes(dow)&&(!r.exceptions||!r.exceptions.includes(ds)));
}
function generateRecurringBlocks(ds){
  return getRecurringForDate(ds).map(r=>({
    id:'rec_'+r.id+'_'+ds,
    recurId:r.id,
    type:'timeline',
    name:r.name,
    date:ds,
    startHour:r.startHour,
    durHour:r.durHour,
    color:r.color||'pink',
    done:false,
    memo:r.memo||'',
    category:r.category||'',
    deadline:null,
    priority:null,
    reward:r.reward||null,
    isRecurring:true
  }));
}
function allDates(){const s=new Set(blocks.filter(b=>b.type==='timeline'||b.type==='buffer'||(!b.type)).map(b=>b.date));s.add(todayStr());
  // add nearby dates that have recurring tasks
  for(let i=-3;i<=14;i++){const ds=addDays(todayStr(),i);if(getRecurringForDate(ds).length)s.add(ds);}
  const today=todayStr();
  const arr=[...s].sort();
  const past=arr.filter(d=>d<today).slice(-3);
  const future=arr.filter(d=>d>=today);
  return[...past,...future];}
function daysFromNow(ds){if(!ds)return Infinity;return Math.round((new Date(ds+'T12:00:00')-new Date(todayStr()+'T12:00:00'))/86400000);}

// 파싱
const META=new Set(['오늘','내일','모레','어제','오전','오후','시작','끝내기','완료','마감','까지','이내','정도','걸림','걸려','소요','예정','급함','이하','내로','내에','하기','시간','분','동안','안에','매주','매일']);
const DAY_MAP={'월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':0};
function isMeta(t){if(/^\d+$/.test(t))return true;if(META.has(t))return true;if(/(?:듯|처럼|이내|이하|이전|이후|까지|부터|동안|위해|위한|관련|만큼|정도|가량|이고|이며)$/.test(t))return true;if(t.length===1)return true;return false;}
function parse(raw){
  const today=todayStr(),now=new Date(),year=now.getFullYear();
  let date=today,m;
  m=raw.match(/(\d{1,2})[월]\s*(\d{1,2})[일]?/);
  if(m){const mon=parseInt(m[1]),day=parseInt(m[2]);if(mon>=1&&mon<=12&&day>=1&&day<=31){let y=year;if(new Date(y+'-'+pad(mon)+'-'+pad(day)+'T12:00:00')<now)y++;date=y+'-'+pad(mon)+'-'+pad(day);}}
  else{m=raw.match(/(\d{1,2})[./](\d{1,2})(?=[^\d]|$)/);if(m){const mon=parseInt(m[1]),day=parseInt(m[2]);if(mon>=1&&mon<=12&&day>=1&&day<=31){let y=year;if(new Date(y+'-'+pad(mon)+'-'+pad(day)+'T12:00:00')<now)y++;date=y+'-'+pad(mon)+'-'+pad(day);}}};
  if(/오늘/.test(raw))date=today;if(/내일/.test(raw))date=addDays(today,1);if(/모레/.test(raw))date=addDays(today,2);
  let start=null;
  const tP=[{r:/오후\s*(\d{1,2})시(?:\s*(\d{1,2})분)?/,pm:true},{r:/오전\s*(\d{1,2})시(?:\s*(\d{1,2})분)?/,pm:false},{r:/(\d{1,2})시(?:\s*(\d{1,2})분)?(?=\s*(?:에|부터|시작|,|\.| |$))/,pm:false},{r:/(\d{1,2}):(\d{2})/,pm:false}];
  for(const{r,pm}of tP){const tm=raw.match(r);if(tm){let h=parseInt(tm[1]);if(pm&&h<12)h+=12;if(!pm&&h<7&&h!==0)h+=12;start=h+(tm[2]&&parseInt(tm[2])>=30?.5:0);break;}}
  let dur=1;
  const dP=[{r:/(\d+(?:\.\d+)?)\s*시간\s*(\d+)\s*분/,fn:m=>parseInt(m[1])+parseInt(m[2])/60},{r:/(\d+(?:\.\d+)?)\s*시간(?:\s*(?:이내|반|가량|정도|내))?/,fn:m=>parseFloat(m[1])},{r:/(\d+)\s*분/,fn:m=>Math.max(.5,Math.round(parseInt(m[1])/60*2)/2)},{r:/(\d+(?:\.\d+)?)h(?:r)?/i,fn:m=>parseFloat(m[1])}];
  for(const{r,fn}of dP){const dm=raw.match(r);if(dm){dur=Math.max(.5,Math.min(12,fn(dm)));break;}}
  let masked=raw;
  masked=masked.replace(/매주\s*[월화수목금토일]+/g,' ').replace(/매일/g,' ').replace(/(\d{1,2})[월]\s*\d{1,2}[日]?(?:\s*까지)?/g,' ').replace(/(\d{1,2})[./]\d{1,2}(?:\s*까지)?/g,' ').replace(/오전|오후/g,' ').replace(/오늘|내일|모레|어제/g,' ').replace(/(\d{1,2})\s*시\s*\d{1,2}\s*분/g,' ').replace(/(\d{1,2}):\d{2}/g,' ').replace(/(\d{1,2})\s*시(?:\s*(?:에|부터|까지|시작))?/g,' ').replace(/\d+(?:\.\d+)?\s*시간(?:\s*\d+\s*분)?(?:\s*(?:이내|반|가량|정도|내|걸림|걸려|소요))?/g,' ').replace(/\d+\s*분/g,' ').replace(/\d+(?:\.\d+)?h(?:r)?/gi,' ').replace(/\d+/g,' ').replace(/[,.\-_·。!?~]+/g,' ');
  const tokens=masked.split(/\s+/).map(t=>t.trim()).filter(t=>t.length>=2&&!isMeta(t));
  const name=tokens.join(' ')||'새 작업';
  const daysUntil=Math.round((new Date(date+'T12:00:00')-new Date(today+'T12:00:00'))/86400000);
  // Detect recurring patterns
  let recurDaysDetected=null;
  if(/매일/.test(raw)){recurDaysDetected=[0,1,2,3,4,5,6];}
  else if(/매주/.test(raw)){
    const dayChars=raw.match(/매주\s*([월화수목금토일]+)/);
    if(dayChars){recurDaysDetected=[...dayChars[1]].map(c=>DAY_MAP[c]).filter(d=>d!==undefined);}
  }
  // Also detect standalone 월화수목금토일 patterns after 매주
  if(!recurDaysDetected){
    const standalone=raw.match(/([월화수목금토일]{2,})/);
    if(standalone&&/매주|매일/.test(raw)){recurDaysDetected=[...standalone[1]].map(c=>DAY_MAP[c]).filter(d=>d!==undefined);}
  }
  return{name,date,startHour:start,durHour:dur,daysUntil,recurDays:recurDaysDetected};
}
function freeSlot(date,dur,fixed){
  if(fixed!==null&&fixed!==undefined)return fixed;
  const used=blocks.filter(b=>(b.type==='timeline'||(!b.type&&!b.isBuf))&&b.date===date&&!b.isBuf).map(b=>(({s:b.startHour,e:b.startHour+b.durHour}))).sort((a,b)=>a.s-b.s);
  let c=9;for(const u of used){if(u.s>=c+dur)break;if(u.e>c)c=u.e;}return Math.min(c,23);
}

// 뷰 전환
function isDesktop(){return window.innerWidth>=768;}
function switchView(v){
  curView=v;localStorage.setItem('ff_cur_view',v);
  if(isDesktop()){
    document.getElementById('view-tl').style.display='block';
    document.getElementById('view-inbox').style.display='block';
    const calEl=document.getElementById('view-cal');
    const habitEl=document.getElementById('view-habit');
    const dropEl=document.getElementById('view-drop');
    const goalEl=document.getElementById('view-goal');
    const panelStyle='width:60%;flex-shrink:0;flex-grow:0;border-left:1px solid var(--pl);overflow-y:auto;padding:16px';
    const weekEl=document.getElementById('view-week');
    const statsEl=document.getElementById('view-stats');
    const panels={cal:calEl,habit:habitEl,drop:dropEl,goal:goalEl,week:weekEl,stats:statsEl};
    if(v==='week'){
      // Week view replaces both timeline and calendar
      document.getElementById('view-tl').style.display='none';
      weekEl.style.cssText='display:block;width:100%';
      calEl.style.cssText='display:none';habitEl.style.cssText='display:none';dropEl.style.cssText='display:none';goalEl.style.cssText='display:none';
    }else{
      weekEl.style.cssText='display:none';
      Object.entries(panels).forEach(([k,el])=>{
        if(k==='week')return;
        if(v===k){el.style.cssText='display:block;'+panelStyle;}
        else if(k==='cal'&&(v==='tl'||v==='cal')){el.style.display='block';}
        else{el.style.cssText='display:none';}
      });
    }
  }else{
    document.getElementById('view-tl').style.display=v==='tl'?'block':'none';
    document.getElementById('view-week').style.display=v==='week'?'block':'none';
    document.getElementById('view-cal').style.display=v==='cal'?'block':'none';
    document.getElementById('view-inbox').style.display=v==='inbox'?'block':'none';
    document.getElementById('view-habit').style.display=v==='habit'?'block':'none';
    document.getElementById('view-goal').style.display=v==='goal'?'block':'none';
    document.getElementById('view-drop').style.display=v==='drop'?'block':'none';
    document.getElementById('view-stats').style.display=v==='stats'?'block':'none';
  }
  renderViewTabs();
  if(v==='cal'||isDesktop())renderCal();
  if(v==='week')renderWeek();
  if(v==='goal')renderGoals();
  if(v==='stats')renderStats();
  if(v==='inbox')renderInbox();
  if(v==='habit')renderHabits();
  if(v==='drop')renderDrop();
}
window.addEventListener('resize',()=>{if(isDesktop()){document.getElementById('view-tl').style.display='block';document.getElementById('view-cal').style.display='block';renderCal();if(curView==='habit'){document.getElementById('view-habit').style.display='block';}}});

// 렌더
function render(){renderDateTabs();renderTimeline();renderSummary();if(curView==='inbox'||isDesktop())renderInbox();if(curView==='habit')renderHabits();if(curView==='drop')renderDrop();if(isDesktop()){document.getElementById('view-tl').style.display='block';document.getElementById('view-cal').style.display='block';document.getElementById('view-inbox').style.display='block';}else if(curView==='cal'){renderCal();}}

let _showPastDates=false;
function renderDateTabs(){
  const wrap=document.getElementById('date-tabs');wrap.innerHTML='';
  const all=allDates();
  const today=todayStr();
  const past=all.filter(d=>d<today);
  const todayAndFuture=all.filter(d=>d>=today);
  // Past toggle button
  if(past.length>0){
    const toggle=document.createElement('button');
    toggle.className='dtab';
    toggle.textContent=_showPastDates?'▸':'◂ '+past.length;
    toggle.style.cssText='font-size:11px;padding:4px 8px;min-width:auto';
    toggle.onclick=()=>{_showPastDates=!_showPastDates;renderDateTabs();};
    wrap.appendChild(toggle);
  }
  // Show past dates only if toggled
  if(_showPastDates){
    past.forEach(ds=>{ wrap.appendChild(_makeDateTab(ds)); });
  }
  // Today and future always visible
  todayAndFuture.forEach(ds=>{ wrap.appendChild(_makeDateTab(ds)); });
  document.getElementById('today-label').textContent=dateLabel(viewDate);
}
function _makeDateTab(ds){
  const btn=document.createElement('button');btn.className='dtab'+(ds===viewDate?' active':'');
  btn.textContent=dateLabel(ds);
  btn.onclick=()=>{viewDate=ds;activeMenu=null;render();if(curView==='cal'){calY=parseInt(ds.split('-')[0]);calM=parseInt(ds.split('-')[1])-1;calSel=ds;renderCal();}};
  return btn;
}

function renderSummary(){
  const el=document.getElementById('summary');
  const realB=blocks.filter(b=>(b.type==='timeline'||(!b.type&&!b.isBuf))&&b.date===viewDate&&!b.isBuf);
  const recurB=generateRecurringBlocks(viewDate).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===viewDate));
  const db_=realB.concat(recurB);
  if(!db_.length){el.innerHTML='';return;}
  const total=Math.round(db_.reduce((s,b)=>s+b.durHour,0)*10)/10;
  const done=db_.filter(b=>b.done).length;
  const rem=Math.round(db_.filter(b=>!b.done).reduce((s,b)=>s+b.durHour,0)*10)/10;
  el.innerHTML='<span class="chip">총 '+total+'h</span><span class="chip">완료 '+done+'/'+db_.length+'</span><span class="chip">남은 '+rem+'h</span>';
}

function buildGrid(){
  const tc=document.getElementById('time-col'),bc=document.getElementById('blocks-col');
  tc.innerHTML='';bc.querySelectorAll('.hour-line').forEach(e=>e.remove());
  bc.style.height=(HOURS*PX)+'px';
  for(let i=0;i<=HOURS;i++){
    const t=document.createElement('div');t.className='time-tick';t.style.height=PX+'px';
    const hour=START+i;
    const sp=document.createElement('span');sp.textContent=hour+':00';
    sp.ondblclick=()=>openSheet(hour);
    let _lastTap=0;sp.ontouchend=(e)=>{const now=Date.now();if(now-_lastTap<300){e.preventDefault();openSheet(hour);_lastTap=0;}else{_lastTap=now;}};
    t.appendChild(sp);tc.appendChild(t);
    const l=document.createElement('div');l.className='hour-line';l.style.top=(i*PX)+'px';l.style.height=PX+'px';bc.appendChild(l);
  }
}

function catTagHTML(cat){
  if(!cat)return '';
  return '<span class="b-cat-tag" style="background:'+catColor(cat)+'">'+cat+'</span>';
}

function renderTimeline(){
  const bc=document.getElementById('blocks-col');
  bc.querySelectorAll('.block,.now-line,.empty-tl').forEach(e=>e.remove());
  const realBlocks=blocks.filter(b=>(b.type==='timeline'||(!b.type&&!b.isBuf))&&b.date===viewDate&&!b.isBuf);
  const recurBlocks=generateRecurringBlocks(viewDate).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===viewDate));
  const db_=realBlocks.concat(recurBlocks).sort((a,b)=>a.startHour-b.startHour);
  if(!db_.filter(b=>!b.isBuf&&b.type!=='buffer').length){
    const em=document.createElement('div');em.className='empty-tl';
    em.innerHTML='이 날엔 아직 할 일이 없어<br>+ 버튼으로 추가해봐';bc.appendChild(em);
  }
  if(viewDate===todayStr()){
    const nh=nowH();
    if(nh>=START&&nh<=START+HOURS){
      const l=document.createElement('div');l.className='now-line';l.style.top=hToY(nh)+'px';
      l.innerHTML='<div class="now-dot"></div><div class="now-lbl">'+pad(Math.floor(nh))+':'+pad(Math.round((nh%1)*60))+'</div>';bc.appendChild(l);
    }
  }
  const nh=nowH();
  db_.forEach(b=>{
    const isBuf=b.isBuf||b.type==='buffer';
    const isPast=viewDate===todayStr()&&(b.startHour+b.durHour)<nh;
    const el=document.createElement('div');
    el.className='block '+(isBuf?'c-buf':('c-'+b.color))+(b.done?' done-block':isPast?' past':'')+(String(activeMenu)===String(b.id)?' menu-open':'');
    el.dataset.id=b.id;el.draggable=false;el.style.top=hToY(b.startHour)+'px';el.style.height=Math.max(b.durHour*PX,36)+'px';
    if(!isBuf){
      let menuHTML='<div class="block-menu">';
      if(b.isRecurring){
        menuHTML+='<button class="bmb bmb-done" onclick="completeRecurring(\''+b.recurId+'\',\''+b.date+'\',event)">&#10003; 완료</button>';
        menuHTML+='<button class="bmb" onclick="editRecurring(\''+b.recurId+'\',event)">수정</button>';
        menuHTML+='<button class="bmb" onclick="editRecurringTime(\''+b.recurId+'\',event)">시간</button>';
        menuHTML+='<button class="bmb bmb-del" onclick="skipRecurring(\''+b.recurId+'\',\''+b.date+'\',event)">이번만 삭제</button>';
        menuHTML+='<button class="bmb bmb-del" onclick="delRecurring(\''+b.recurId+'\',event)">완전 삭제</button>';
      } else {
        menuHTML+='<button class="bmb" onclick="editBlock(\''+b.id+'\',event)">수정</button>';
        menuHTML+='<button class="bmb bmb-memo" onclick="openMemo(\''+b.id+'\',event)">메모</button>';
        menuHTML+='<button class="bmb bmb-del" onclick="delBlock(\''+b.id+'\',event)">삭제</button>';
      }
      menuHTML+='</div>';
      const recurIcon=b.isRecurring?'<span class="recur-icon">\uD83D\uDD01</span>':'';
      let quickBtns='<div class="b-quick">';
      if(b.isRecurring){
        const rDone=blocks.some(x=>x.recurDoneId===b.recurId&&x.date===b.date&&x.done);
        quickBtns+='<button class="b-qbtn" ontouchend="event.stopPropagation();event.preventDefault();completeRecurring(\''+b.recurId+'\',\''+b.date+'\',event)" onclick="event.stopPropagation();completeRecurring(\''+b.recurId+'\',\''+b.date+'\',event)" style="'+(rDone?'background:var(--pd);color:#fff;border-color:var(--pd)':'')+'">✓</button>';
      }else{
        quickBtns+='<button class="b-qbtn" ontouchend="event.stopPropagation();event.preventDefault();toggleDone(\''+b.id+'\')" onclick="event.stopPropagation();toggleDone(\''+b.id+'\')" style="'+(b.done?'background:var(--pd);color:#fff;border-color:var(--pd)':'')+'">✓</button>';
      }
      quickBtns+='<button class="b-qbtn b-qbtn-more" ontouchend="event.stopPropagation();event.preventDefault();activeMenu=String(activeMenu)===\''+b.id+'\'?null:\''+b.id+'\';renderTimeline()" onclick="event.stopPropagation();activeMenu=String(activeMenu)===\''+b.id+'\'?null:\''+b.id+'\';renderTimeline()">⋯</button></div>';
      el.innerHTML=menuHTML+'<div class="b-inner"><div class="b-name">'+catTagHTML(b.category)+(b.done?'&#10003; ':'')+b.name+recurIcon+'</div><div class="b-time">'+fmtH(b.startHour)+' – '+fmtH(b.startHour+b.durHour)+'</div>'+(b.memo?'<div class="b-memo">'+b.memo+'</div>':'')+'</div>'+quickBtns+'<div class="rh" data-id="'+b.id+'"'+(b.isRecurring?' data-recur="'+b.recurId+'"':'')+'></div>';
      el.addEventListener('touchstart',onTS,{passive:true});
      el.addEventListener('touchmove',onTM,{passive:false});
      el.addEventListener('touchend',onTE);
      el.addEventListener('mousedown',onMS);
      const rh=el.querySelector('.rh');
      if(rh){rh.addEventListener('touchstart',onRS,{passive:true});rh.addEventListener('mousedown',onMRS);}
      // Menu only opens via ⋯ button, no long-press menu
      el.addEventListener('click',ev=>{ev.stopPropagation();});
    } else {
      el.innerHTML='<div class="b-inner"><div class="b-name">&#9749; 여유</div></div>';
    }
    bc.appendChild(el);
  });
}

// 꾹 누르기 (3초) -> 드래그
const HOLD=500; // 0.5초 꾹 누르면 드래그
function onTS(e){
  if(e.target.classList.contains('rh'))return;
  if(e.target.closest('.block-menu,.b-quick'))return;
  didDrag=false;holdReady=false;
  const id=e.currentTarget.dataset.id;
  const b=blocks.find(x=>x.id===id);if(!b)return;
  const sy=e.touches[0].clientY;
  holdTimer=setTimeout(()=>{
    holdReady=true;
    dragState={id,type:'move',sy,origStart:b.startHour};
    if(navigator.vibrate)navigator.vibrate([50,30,50]);
    const el=document.querySelector('.block[data-id="'+id+'"]');
    if(el)el.classList.add('dragging');
  },HOLD);
}
function onRS(e){
  e.stopPropagation();clearTimeout(holdTimer);
  const id=e.currentTarget.dataset.id;
  const b=blocks.find(x=>x.id===id);if(!b)return;
  const sy=e.touches[0].clientY;
  let moved=false;
  const onMove=()=>{moved=true;};
  const cleanup=()=>{document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',cleanup);};
  document.addEventListener('touchmove',onMove,{passive:true});
  document.addEventListener('touchend',cleanup);
  holdTimer=setTimeout(()=>{
    cleanup();
    if(moved)return;
    holdReady=true;
    dragState={id,type:'resize',sy,origDur:b.durHour};
    document.body.style.overflow='hidden'; // Lock scroll during resize
    if(navigator.vibrate)navigator.vibrate(30);
  },400);
}
function onTM(e){
  if(!holdReady){clearTimeout(holdTimer);return;}
  if(!dragState)return;
  const dy=(e.touches[0].clientY-dragState.sy)/PX;
  if(Math.abs(dy)>0.3)didDrag=true;
  const b=blocks.find(x=>x.id===dragState.id);if(!b)return;
  if(dragState.type==='move'){let ns=Math.round((dragState.origStart+dy)*2)/2;ns=Math.max(START,Math.min(START+HOURS-b.durHour,ns));b.startHour=ns;}
  else{let nd=Math.round((dragState.origDur+dy)*2)/2;nd=Math.max(.5,Math.min(START+HOURS-b.startHour,nd));b.durHour=nd;}
  const el=document.querySelector('.block[data-id="'+dragState.id+'"]');
  if(el){el.style.top=hToY(b.startHour)+'px';el.style.height=Math.max(b.durHour*PX,36)+'px';const bt=el.querySelector('.b-time');if(bt)bt.textContent=fmtH(b.startHour)+' – '+fmtH(b.startHour+b.durHour);}
  e.preventDefault();
}
function saveRecurDrag(id){
  // If dragged block was recurring, sync changes back to recurring array
  const el=document.querySelector('.block[data-id="'+id+'"]');
  if(!el)return;
  const rh=el.querySelector('.rh[data-recur]');
  if(!rh)return;
  const recurId=rh.dataset.recur;
  const allB=generateRecurringBlocks(viewDate);
  const draggedB=allB.find(x=>String(x.id)===String(id));
  if(!draggedB)return;
  const r=recurring.find(x=>String(x.id)===String(recurId));
  if(r){r.startHour=draggedB.startHour;r.durHour=draggedB.durHour;saveRecurring();}
}
function onTE(){
  clearTimeout(holdTimer);
  const wasDrag=!!dragState;
  if(dragState){
    const el=document.querySelector('.block[data-id="'+dragState.id+'"]');if(el)el.classList.remove('dragging');
    saveRecurDrag(dragState.id);
    save();
    document.body.style.overflow=''; // Restore scroll
  }
  dragState=null;holdReady=false;
  if(wasDrag){
    // Actual drag happened — keep didDrag=true briefly so click handler ignores it
    setTimeout(()=>{didDrag=false;},100);
  } else {
    // No drag — reset immediately so click handler fires properly
    didDrag=false;
  }
}

// Mouse drag (desktop) — mirrors touch handlers
function onMS(e){
  if(e.button!==0)return;
  if(e.target.classList.contains('rh'))return;
  if(e.target.closest('.block-menu'))return;
  if(e.target.closest('.b-quick'))return;
  didDrag=false;holdReady=false;
  const id=e.currentTarget.dataset.id;
  const b=blocks.find(x=>x.id===id);if(!b)return;
  const sy=e.clientY;
  // Short delay so click events (✓, ⋯) still work
  holdTimer=setTimeout(()=>{
    holdReady=true;
    dragState={id,type:'move',sy,origStart:b.startHour};
    const el=document.querySelector('.block[data-id="'+id+'"]');
    if(el)el.classList.add('dragging');
  },150);
}
function onMRS(e){
  e.stopPropagation();e.preventDefault();clearTimeout(holdTimer);
  const id=e.currentTarget.dataset.id;
  const b=blocks.find(x=>x.id===id);if(!b)return;
  holdReady=true;
  dragState={id,type:'resize',sy:e.clientY,origDur:b.durHour};
}
document.addEventListener('mousemove',e=>{
  if(!holdReady){if(holdTimer&&e.movementX**2+e.movementY**2>9)clearTimeout(holdTimer);return;}
  if(!dragState)return;
  const dy=(e.clientY-dragState.sy)/PX;
  if(Math.abs(dy)>0.3)didDrag=true;
  const b=blocks.find(x=>x.id===dragState.id);if(!b)return;
  if(dragState.type==='move'){let ns=Math.round((dragState.origStart+dy)*2)/2;ns=Math.max(START,Math.min(START+HOURS-b.durHour,ns));b.startHour=ns;}
  else{let nd=Math.round((dragState.origDur+dy)*2)/2;nd=Math.max(.5,Math.min(START+HOURS-b.startHour,nd));b.durHour=nd;}
  const el=document.querySelector('.block[data-id="'+dragState.id+'"]');
  if(el){el.style.top=hToY(b.startHour)+'px';el.style.height=Math.max(b.durHour*PX,36)+'px';const bt=el.querySelector('.b-time');if(bt)bt.textContent=fmtH(b.startHour)+' – '+fmtH(b.startHour+b.durHour);}
  e.preventDefault();
});
document.addEventListener('mouseup',()=>{
  clearTimeout(holdTimer);
  if(dragState){const el=document.querySelector('.block[data-id="'+dragState.id+'"]');if(el)el.classList.remove('dragging');saveRecurDrag(dragState.id);save();}
  dragState=null;holdReady=false;
});

function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
let calCatFilter='전체';
function setCalCat(cat){calCatFilter=cat;renderCal();}
function renderCal(){
  document.getElementById('cal-title').textContent=calY+'년 '+MONTH[calM];
  // Category filter pills
  const cfEl=document.getElementById('cal-cat-filter');
  if(cfEl){
    const cats=['전체','일','개인','건강','크리에이터','공부'];
    const catColors={'전체':'var(--pd)','일':'#E24B4A','개인':'#4A9EDB','건강':'#3BB88A','크리에이터':'#A87CC5','공부':'#E8A735'};
    cfEl.innerHTML=cats.map(c=>{const cc=catColors[c]||'var(--pd)';return'<button style="padding:3px 10px;border-radius:99px;border:1.5px solid '+cc+';background:'+(calCatFilter===c?cc:'#fff')+';color:'+(calCatFilter===c?'#fff':cc)+';font-size:10px;font-weight:600;cursor:pointer;font-family:inherit" onclick="setCalCat(\''+c+'\')">'+c+'</button>';}).join('');
  }
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const today=todayStr();
  const firstDay=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const dip=new Date(calY,calM,0).getDate();
  for(let i=0;i<firstDay;i++){
    const d=dip-firstDay+1+i;const el=document.createElement('div');el.className='cal-day other';
    el.innerHTML='<div class="cal-num">'+d+'</div>';grid.appendChild(el);
  }
  for(let d=1;d<=dim;d++){
    const ds=calY+'-'+pad(calM+1)+'-'+pad(d);
    let realB=blocks.filter(b=>(b.type==='timeline'||(!b.type&&!b.isBuf))&&b.date===ds&&!b.isBuf);
    let recurB=generateRecurringBlocks(ds).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===ds));
    if(calCatFilter!=='전체'){realB=realB.filter(b=>b.category===calCatFilter);recurB=recurB.filter(b=>b.category===calCatFilter);}
    const db_=realB.concat(recurB);
    const dow=(firstDay+d-1)%7;
    const isToday=ds===today,isSel=ds===calSel;
    const el=document.createElement('div');
    el.className='cal-day'+(isToday?' tod':'')+(isSel?' sel':'');
    el.onclick=()=>{calSel=ds;viewDate=ds;renderCal();renderCalDetail(ds);renderDateTabs();renderSummary();};
    const nc='cal-num'+(dow===0?' sun':dow===6?' sat':'');
    const cp=getCyclePhaseForDate(ds);
    const cycleMarker=cp?(cp.type==='period'?'<div style="font-size:6px;line-height:1;margin-top:1px">🩸</div>':'<div style="font-size:6px;line-height:1;margin-top:1px">⚠️</div>'):'';
    el.innerHTML='<div class="'+nc+'">'+d+'</div>'+cycleMarker;
    if(db_.length){
      const dots=document.createElement('div');dots.className='cal-dots';
      db_.slice(0,3).forEach(b=>{const dot=document.createElement('div');dot.className='cal-dot';const C={red:'#E24B4A',amb:'#EF9F27',pink:'#E8849D',blue:'#378ADD',teal:'#1D9E75'};dot.style.background=C[b.color]||'#E8849D';dots.appendChild(dot);});
      el.appendChild(dots);
      // Mini text schedule preview
      const preview=document.createElement('div');preview.className='cal-preview';
      db_.slice(0,2).forEach(b=>{
        const line=document.createElement('div');line.className='cal-pv-line';
        line.textContent=b.name;
        preview.appendChild(line);
      });
      if(db_.length>2){const more=document.createElement('div');more.className='cal-pv-line cal-pv-more';more.textContent='+'+(db_.length-2)+'개';preview.appendChild(more);}
      el.appendChild(preview);
    }
    grid.appendChild(el);
  }
  const total=firstDay+dim,remain=total%7===0?0:7-total%7;
  for(let i=1;i<=remain;i++){const el=document.createElement('div');el.className='cal-day other';el.innerHTML='<div class="cal-num">'+i+'</div>';grid.appendChild(el);}
  if(calSel)renderCalDetail(calSel);
}
function renderCalDetail(ds){
  const det=document.getElementById('cal-detail');
  const realB=blocks.filter(b=>(b.type==='timeline'||(!b.type&&!b.isBuf))&&b.date===ds&&!b.isBuf);
  const recurB=generateRecurringBlocks(ds).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===ds));
  const db_=realB.concat(recurB).sort((a,b)=>a.startHour-b.startHour);
  const[,m,d]=ds.split('-');
  det.style.display='block';
  let h='<div class="cal-detail"><div class="cal-dlabel">'+parseInt(m)+'월 '+parseInt(d)+'일 ('+getDow(ds)+')</div>';
  if(!db_.length)h+='<div style="text-align:center;color:#bbb;font-size:13px;padding:16px 0">이 날은 비어있어</div>';
  else{const C={red:'#E24B4A',amb:'#EF9F27',pink:'#E8849D',blue:'#378ADD',teal:'#1D9E75'};
    db_.forEach(b=>{const c=C[b.color]||'#E8849D';const ri=b.isRecurring?' \uD83D\uDD01':'';h+='<div class="cal-ev" style="border-left-color:'+c+(b.done?';opacity:.4':'')+'" onclick="viewDate=\''+ds+'\';switchView(\'tl\');"><div class="cal-ev-time" style="color:'+c+'">'+fmtH(b.startHour)+' – '+fmtH(b.startHour+b.durHour)+'</div><div class="cal-ev-name">'+(b.done?'&#10003; ':'')+b.name+ri+'</div>'+(b.memo?'<div style="font-size:11px;color:#aaa;margin-top:2px">'+b.memo+'</div>':'')+'</div>';});
  }
  h+='</div>';det.innerHTML=h;
}

// ====== INBOX (Brain Dump) ======
function getInboxItems(){return blocks.filter(b=>b.type==='inbox');}

function addInboxItem(name){
  if(!name.trim())return;
  blocks.push({
    id:String(nid++),
    type:'inbox',
    name:name.trim(),
    category:inboxNewCategory||'',
    deadline:inboxNewDeadline||null,
    priority:null,
    done:false,
    memo:'',
    date:'',startHour:0,durHour:1,color:'pink'
  });
  save();
  inboxNewDeadline='';
  inboxNewCategory='';
  renderInbox();
}

function setInboxPriority(id,pri){
  const b=blocks.find(x=>x.id===id);if(!b)return;
  b.priority=b.priority===pri?null:pri;
  if(pri==='today'){
    moveInboxToTimeline(id);return;
  }
  save();renderInbox();
}

function moveInboxToTimeline(id){
  const b=blocks.find(x=>x.id===id);if(!b)return;
  const targetDate=todayStr();
  const dur=1;
  const start=freeSlot(targetDate,dur,null);
  b.type='timeline';
  b.date=targetDate;
  b.startHour=start;
  b.durHour=dur;
  b.color=pickColor(0);
  b.priority=null;
  save();
  viewDate=targetDate;
  render();
  showToast('&#128197;','타임라인에 추가','"'+b.name+'" 오늘 '+fmtH(start)+'에 배치');
}

function toggleInboxDone(id){
  const b=blocks.find(x=>x.id===id);if(!b)return;
  b.done=!b.done;save();renderInbox();
}

function delInboxItem(id){
  const b=blocks.find(x=>x.id===id);const name=b?b.name:'';
  blocks=blocks.filter(x=>x.id!==id);save();renderInbox();
  showToast('&#128465;','삭제 완료','"'+name+'" 지웠어');
}

function ddayLabel(deadline){
  if(!deadline)return '';
  const d=daysFromNow(deadline);
  if(d<0)return{text:'D+'+Math.abs(d),cls:'urgent'};
  if(d===0)return{text:'D-DAY',cls:'urgent'};
  if(d<=3)return{text:'D-'+d,cls:'soon'};
  return{text:'D-'+d,cls:'normal'};
}

function getSmartTodayItems(){
  return getInboxItems()
    .filter(b=>!b.done&&b.deadline&&daysFromNow(b.deadline)<=3)
    .sort((a,b)=>daysFromNow(a.deadline)-daysFromNow(b.deadline));
}

function renderInbox(){
  const wrap=document.getElementById('inbox-content');
  const items=getInboxItems();
  const filtered=inboxCatFilter?items.filter(b=>b.category===inboxCatFilter):items;
  const smartItems=getSmartTodayItems();

  let h='';
  // Quick input
  h+='<div class="inbox-input-row">';
  h+='<input class="inbox-input" id="inbox-quick-input" placeholder="빠르게 할일 추가... (Enter)" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){addInboxItem(this.value);this.value=\'\';}">';
  h+='<button class="inbox-add-btn" onclick="const i=document.getElementById(\'inbox-quick-input\');addInboxItem(i.value);i.value=\'\';">+</button>';
  h+='</div>';

  // Extra row: deadline + category for new items
  h+='<div class="inbox-extra-row">';
  h+='<label>마감일</label><input type="date" id="inbox-deadline-input" value="'+(inboxNewDeadline||'')+'" onchange="inboxNewDeadline=this.value">';
  h+='<label style="margin-left:8px">카테고리</label>';
  h+='</div>';
  h+='<div class="cat-pills" style="margin-bottom:12px">';
  allCategories().forEach(c=>{
    h+='<button class="cat-pill'+(inboxNewCategory===c.name?' active':'')+'" style="'+(inboxNewCategory===c.name?'background:'+c.color+';border-color:'+c.color:'')+'" onclick="inboxNewCategory=inboxNewCategory===\''+c.name+'\'?\'\':\''+c.name+'\';renderInbox();">'+c.name+'</button>';
  });
  h+='</div>';

  // Category filter
  h+='<div class="inbox-filter-row">';
  h+='<button class="cat-pill'+(inboxCatFilter===''?' active':'')+'" style="'+(inboxCatFilter===''?'background:var(--pink);color:#fff;border-color:var(--pink)':'')+'" onclick="inboxCatFilter=\'\';renderInbox();">전체</button>';
  allCategories().forEach(c=>{
    h+='<button class="cat-pill'+(inboxCatFilter===c.name?' active':'')+'" style="'+(inboxCatFilter===c.name?'background:'+c.color+';border-color:'+c.color:'color:'+c.color+';border-color:'+c.color)+'" onclick="inboxCatFilter=inboxCatFilter===\''+c.name+'\'?\'\':\''+c.name+'\';renderInbox();">'+c.name+'</button>';
  });
  h+='</div>';

  // Smart Today
  if(smartItems.length){
    h+='<div class="smart-today">';
    h+='<div class="smart-today-title">&#128308; 오늘 추천 <span style="font-weight:400;font-size:10px;color:#aaa">마감 임박!</span></div>';
    smartItems.forEach(b=>{
      const dd=ddayLabel(b.deadline);
      h+='<div class="smart-today-item">';
      h+='<span class="smart-today-dday">'+dd.text+'</span>';
      h+='<span class="smart-today-name">'+(b.category?'<span class="b-cat-tag" style="background:'+catColor(b.category)+'">'+b.category+'</span>':'')+b.name+'</span>';
      h+='<button class="smart-today-btn" onclick="moveInboxToTimeline(\''+b.id+'\')">오늘 배치</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Group by priority
  const groups=[
    {key:'tomorrow',label:'내일',items:filtered.filter(b=>b.priority==='tomorrow'&&!b.done)},
    {key:'week',label:'이번주',items:filtered.filter(b=>b.priority==='week'&&!b.done)},
    {key:'someday',label:'언젠가',items:filtered.filter(b=>b.priority==='someday'&&!b.done)},
    {key:null,label:'분류 안됨',items:filtered.filter(b=>!b.priority&&!b.done)},
    {key:'done',label:'완료',items:filtered.filter(b=>b.done)}
  ];

  groups.forEach(g=>{
    if(!g.items.length)return;
    h+='<div class="inbox-section">';
    h+='<div class="inbox-section-title">'+g.label+' <span class="count">'+g.items.length+'</span></div>';

      h+='<button class="inbox-check'+(b.done?' checked':'')+'" onclick="toggleInboxDone(\''+b.id+'\')">'+(b.done?'&#10003;':'')+'</button>';
      h+='<div class="inbox-body">';
      h+='<div class="inbox-name">'+(b.category?'<span class="b-cat-tag" style="background:'+catColor(b.category)+'">'+b.category+'</span>':'')+b.name+'</div>';
      h+='<div class="inbox-meta">';
      if(dd){h+='<span class="inbox-dday '+dd.cls+'">'+dd.text+'</span>';}
      if(b.deadline){h+='<span>'+b.deadline+'</span>';}
      h+='</div>';

function parseDotFormat(raw){
  // 제목.날짜.시작시간.수행시간 형식
  const parts=raw.split('.').map(s=>s.trim()).filter(Boolean);
  if(parts.length<2)return null;
  const name=parts[0];
  let date=todayStr(),startHour=null,durHour=1;
  for(let i=1;i<parts.length;i++){
    const s=parts[i];
    // 날짜: 오늘/내일/모레 or 430→4월30일 or 4/30
    if(/^오늘$/.test(s))date=todayStr();
    else if(/^내일$/.test(s))date=addDays(todayStr(),1);
    else if(/^모레$/.test(s))date=addDays(todayStr(),2);
    else if(/^\d{3,4}$/.test(s)){const ds=s.length===3?'0'+s:s;const mon=ds.slice(0,2),day=ds.slice(2);const y=new Date().getFullYear();date=y+'-'+mon+'-'+day;}
    else if(/^\d{1,2}\/\d{1,2}$/.test(s)){const[mon,day]=s.split('/');const y=new Date().getFullYear();date=y+'-'+pad(parseInt(mon))+'-'+pad(parseInt(day));}
    // 시작시간: 14시 or 14:30 or 14
    else if(/^\d{1,2}시$/.test(s)){startHour=parseInt(s);}
    else if(/^\d{1,2}:\d{2}$/.test(s)){const[h,m]=s.split(':').map(Number);startHour=h+m/60;}
    else if(/^\d{1,2}시\d{1,2}분$/.test(s)){const m=s.match(/(\d+)시(\d+)분/);startHour=parseInt(m[1])+parseInt(m[2])/60;}
    // 수행시간: 2시간 or 30분 or 1시간30분 or 1.5시간
    else if(/시간/.test(s)||/분/.test(s)){
      const hm=s.match(/(\d+(?:\.\d+)?)\s*시간/);const mm=s.match(/(\d+)\s*분/);
      durHour=(hm?parseFloat(hm[1]):0)+(mm?parseInt(mm[1])/60:0);
      if(!hm&&mm)durHour=parseInt(mm[1])/60;
      if(durHour<0.1)durHour=0.5;
    }
    // 숫자만 있으면: 이미 시작시간 있으면 소요시간, 없으면 시작시간
    else if(/^\d{1,2}$/.test(s)){const n=parseInt(s);if(startHour!==null&&n<=12){durHour=n;}else if(n>=0&&n<=23){startHour=n;}}
  }
  return{name,date,startHour,durHour,daysUntil:Math.round((new Date(date+'T12:00:00')-new Date(todayStr()+'T12:00:00'))/86400000)};
}
function quickAdd(){
  const raw=document.getElementById('ri').value.trim();if(!raw)return;
  const normalized=raw.replace(/[~～]/g,'.').replace(/\s+/g,' ');
  const p=normalized.includes('.')?parseDotFormat(normalized)||parse(raw):parseDotFormat(normalized.replace(/\s+/g,'.'))||parse(raw);
  // Force date override from text keywords (highest priority)
  if(/내일/.test(raw))p.date=addDays(todayStr(),1);
  if(/모레/.test(raw))p.date=addDays(todayStr(),2);
  if(/오늘/.test(raw))p.date=todayStr();
  // Override with UI picker values only if user explicitly changed them
  const uiDate=document.getElementById('sheet-date').value;
  const uiTime=document.getElementById('sheet-time').value;
  const uiDurH=parseInt(document.getElementById('sheet-dur-h').value)||0;
  const uiDurM=parseInt(document.getElementById('sheet-dur-m').value)||0;
  // Only use UI pickers if text input is just a title (no date/time/duration keywords)
  const textHasInfo=/오늘|내일|모레|\d{1,2}시|\d+분|\d+시간|\d{3,4}|\d{1,2}[월\/]\d{1,2}/.test(raw);
  if(!textHasInfo){
    if(uiDate)p.date=uiDate;
    if(uiTime){const[hh,mm]=uiTime.split(':').map(Number);p.startHour=hh+(mm/60);}
    if(uiDurH||uiDurM){p.durHour=uiDurH+(uiDurM/60);if(p.durHour<0.1)p.durHour=0.5;}
  }
  if(p.recurDays&&p.recurDays.length>0){
    addRecurringTask({name:p.name,days:p.recurDays,startHour:p.startHour||9,durHour:p.durHour,color:pickColor(0),category:sheetCategory});
    closeSheet();return;
  }
  const start=freeSlot(p.date,p.durHour,p.startHour);
  blocks.push({id:String(nid++),type:'timeline',name:p.name,date:p.date,startHour:start,durHour:p.durHour,color:pickColor(p.daysUntil),done:false,memo:'',category:sheetCategory});
  save();render();closeSheet();
  showToast('⏰',p.name+' 추가됨',dateLabel(p.date)+' '+fmtH(start)+' 시작');
}

    recurOn=true;recurDays=p.recurDays;
    const sw=document.getElementById('recur-switch');
    const lb=document.getElementById('recur-label');
