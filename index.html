  const start=freeSlot(preview.date,preview.durHour,preview.startHour);
  const dayLabels=['일','월','화','수','목','금','토'];
  const recurInfo=recurOn&&recurDays.length?'<div style="margin-top:6px;font-size:12px;color:var(--pd);font-weight:600">\uD83D\uDD01 매주 '+recurDays.sort().map(d=>dayLabels[d]).join(', ')+' 반복</div>':'';
  const btnLabel=recurOn&&recurDays.length?'반복 일정 추가 \uD83D\uDD01':'타임블록에 추가 &#10003;';
  document.getElementById('parea').innerHTML='<div class="pbox"><div class="plabel">이렇게 들어가</div><div class="pblock"><div class="pdate">'+dateLabel(preview.date)+' · '+fmtH(start)+' – '+fmtH(start+preview.durHour)+'</div><div class="pname">'+(preview.category?catTagHTML(preview.category):'')+preview.name+'</div><div class="pdur">'+preview.durHour+'시간</div>'+recurInfo+'</div>'+(bufOn&&!(recurOn&&recurDays.length)?'<div class="pbuf">+ &#9749; '+fmtH(start+preview.durHour)+' 여유 10분 자동 삽입</div>':'')+'<div class="ar"><label class="al">이름</label><input class="ai" value="'+preview.name+'" oninput="preview.name=this.value"></div><div class="ar"><label class="al">시작</label><input class="ai" type="number" step="0.5" value="'+start+'" oninput="preview.startHour=+this.value"></div><div class="ar"><label class="al">시간(h)</label><input class="ai" type="number" step="0.5" value="'+preview.durHour+'" oninput="preview.durHour=+this.value"></div><textarea class="mi" placeholder="메모 (선택)" oninput="preview.memo=this.value">'+(preview.memo||'')+'</textarea><button class="cbtn" onclick="confirmAdd()">'+btnLabel+'</button></div>';
}
function confirmAdd(){
  if(!preview)return;
  preview.category=sheetCategory;
  const start=freeSlot(preview.date,preview.durHour,preview.startHour);
  if(recurOn&&recurDays.length){
    // Add as recurring task
    addRecurringTask({
      name:preview.name,
      days:[...recurDays],
      startHour:start,
      durHour:preview.durHour,
      color:preview.color,
      category:sheetCategory,
      memo:preview.memo||''
    });
    showToast('\uD83D\uDD01','반복 일정 추가','"'+preview.name+'" 매주 반복 등록 완료');
    closeSheet();
    return;
  }
  blocks.push({...preview,startHour:start});
  // buffer disabled
  blocks.sort((a,b)=>{
    if(a.type==='inbox'&&b.type!=='inbox')return 1;
    if(a.type!=='inbox'&&b.type==='inbox')return -1;
    if(a.date!==b.date)return (a.date||'').localeCompare(b.date||'');
    return (a.startHour||0)-(b.startHour||0);
  });
  save();viewDate=preview.date;render();closeSheet();
}

function getDropItems(){
  const raw=localStorage.getItem('ff_drops');
  try{return raw?JSON.parse(raw):[]}catch{return[]}
}
function saveDropItems(items){
  try{localStorage.setItem('ff_drops',JSON.stringify(items));}catch(e){}
  try{if(_uid)db.collection('users').doc(_uid).update({drops:items}).catch(()=>{});}catch(e){}
}
function addDropItem(text){
  if(!text||!text.trim())return;
  const items=getDropItems();
  items.unshift({id:Date.now().toString(),name:text.trim(),done:false,ts:Date.now()});
  saveDropItems(items);renderDrop();
}
function toggleDropDone(id){
  try{
    const items=getDropItems();
    const it=items.find(i=>String(i.id)===String(id));
    if(it){it.done=!it.done;saveDropItems(items);renderDrop();if(it.done)showDone();}
  }catch(e){console.error('toggleDropDone',e);}
}
function deleteDropItem(id){
  try{
    let items=getDropItems();
    items=items.filter(i=>String(i.id)!==String(id));
    saveDropItems(items);renderDrop();
  }catch(e){console.error('deleteDropItem',e);}
}
function editDropItem(id){
  try{
    const items=getDropItems();
    const it=items.find(i=>String(i.id)===String(id));
    if(!it)return;
    const newName=prompt('수정:',it.name);
    if(newName!==null&&newName.trim()){it.name=newName.trim();saveDropItems(items);renderDrop();}
  }catch(e){console.error('editDropItem',e);}
}
function moveDropItem(id,dir){
  try{
    const items=getDropItems();
    const todo=items.filter(i=>!i.done);
    const done=items.filter(i=>i.done);
    const idx=todo.findIndex(i=>String(i.id)===String(id));
    if(idx<0)return;
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=todo.length)return;
    [todo[idx],todo[newIdx]]=[todo[newIdx],todo[idx]];
    saveDropItems([...todo,...done]);renderDrop();
  }catch(e){console.error('moveDropItem',e);}
}
function shuffleDrop(){
  const items=getDropItems();
  const todo=items.filter(i=>!i.done);
  const done=items.filter(i=>i.done);
  for(let i=todo.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[todo[i],todo[j]]=[todo[j],todo[i]];}
  saveDropItems([...todo,...done]);renderDrop();
}
function clearDoneDrop(){
  let items=getDropItems();
  items=items.filter(i=>!i.done);
  saveDropItems(items);renderDrop();
}
function renderDrop(){
  const wrap=document.getElementById('drop-content');
  if(!wrap)return;
  const items=getDropItems();
  const todo=items.filter(i=>!i.done);
  const done=items.filter(i=>i.done);
  let h='';
  h+='<div style="font-size:13px;color:var(--pd);font-weight:700;margin-bottom:12px">🧠 뇌 비우기 — 일단 다 적어!</div>';
  h+='<div class="drop-input-row">';
  h+='<input class="drop-input" id="drop-input" placeholder="머릿속에 있는 거 아무거나..." onkeydown="if(event.key===\'Enter\'&&!event.isComposing){addDropItem(this.value);this.value=\'\';}">';
  h+='<button class="drop-add-btn" onclick="const i=document.getElementById(\'drop-input\');addDropItem(i.value);i.value=\'\';">+</button>';
  h+='</div>';
  if(items.length>0){
    h+='<div class="drop-actions">';
    h+='<button class="drop-action-btn" onclick="shuffleDrop()">🎲 랜덤 셔플</button>';
    if(done.length)h+='<button class="drop-action-btn" onclick="clearDoneDrop()">🗑 완료 지우기</button>';
    h+='<span style="flex:1"></span><span style="font-size:11px;color:#aaa">'+todo.length+'개 남음</span>';
    h+='</div>';
  }
  if(todo.length===0&&done.length===0){
    h+='<div class="drop-empty">머리가 복잡할 때<br>여기에 다 쏟아내면 돼<br><br>적는 것만으로도 뇌 용량 확보 됨 🫧</div>';
  }
  todo.forEach((it,i)=>{
    h+='<div class="drop-item" draggable="true" data-drop-idx="'+i+'"'+(i===0?' style="border-left-color:var(--pd);background:var(--pl)"':'')+'>';
    h+='<button class="drop-check" data-drop-done="'+it.id+'"></button>';
    h+='<div class="drop-name" data-drop-edit="'+it.id+'">'+it.name+'</div>';
    h+='<button class="drop-del" data-drop-del="'+it.id+'">✕</button>';
    h+='</div>';
  });
  if(done.length){
    h+='<div style="font-size:11px;color:#aaa;margin:12px 0 6px;font-weight:600">완료 '+done.length+'개</div>';
    done.forEach(it=>{
      h+='<div class="drop-item done">';
      h+='<button class="drop-check" data-drop-done="'+it.id+'">✓</button>';
      h+='<div class="drop-name">'+it.name+'</div>';
      h+='<button class="drop-del" data-drop-del="'+it.id+'">✕</button>';
      h+='</div>';
    });
  }
  wrap.innerHTML=h;
}
// Drag & drop reorder for drop items
let _dragIdx=null;
document.addEventListener('dragstart',function(e){
  const item=e.target.closest('[data-drop-idx]');
  if(!item)return;
  _dragIdx=parseInt(item.dataset.dropIdx);
  e.dataTransfer.effectAllowed='move';
  item.style.opacity='0.4';
});
document.addEventListener('dragend',function(e){
  const item=e.target.closest('[data-drop-idx]');
  if(item)item.style.opacity='1';
  document.querySelectorAll('.drop-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
  _dragIdx=null;
});
document.addEventListener('dragover',function(e){
  const item=e.target.closest('[data-drop-idx]');
  if(!item||_dragIdx===null)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.drop-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
  item.classList.add('drag-over');
});
document.addEventListener('dragleave',function(e){
  const item=e.target.closest('[data-drop-idx]');
  if(item)item.classList.remove('drag-over');
});
document.addEventListener('drop',function(e){
  const item=e.target.closest('[data-drop-idx]');
  if(!item||_dragIdx===null)return;
  e.preventDefault();
  const toIdx=parseInt(item.dataset.dropIdx);
  if(_dragIdx===toIdx)return;
  try{
    const items=getDropItems();
    const todo=items.filter(i=>!i.done);
    const done=items.filter(i=>i.done);
    const moved=todo.splice(_dragIdx,1)[0];
    todo.splice(toIdx,0,moved);
    saveDropItems([...todo,...done]);
    renderDrop();
  }catch(err){console.error('drop reorder',err);}
  _dragIdx=null;
});

// Event delegation for drop - register once
document.addEventListener('click',function(e){
  const del=e.target.closest('[data-drop-del]');
  if(del){e.preventDefault();e.stopPropagation();deleteDropItem(del.dataset.dropDel);return;}
  const done=e.target.closest('[data-drop-done]');
  if(done){e.preventDefault();e.stopPropagation();toggleDropDone(done.dataset.dropDone);return;}
  const edit=e.target.closest('[data-drop-edit]');
  if(edit){e.preventDefault();e.stopPropagation();editDropItem(edit.dataset.dropEdit);return;}
});

function goalKey(type){
  const d=new Date();
  if(type==='month')return 'm'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  const day=d.getDay()||7;const mon=new Date(d);mon.setDate(d.getDate()-(day-1));
  return 'w'+mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
}

  if(!goals[key])goals[key]=[];
  goals[key].push({id:Date.now().toString(),text,done:false});
  saveGoals(goals);input.value='';renderGoals();
}

}

function getMyShareCode(){
  if(!_uid)return null;
  // Generate short code from uid
  let h=0;for(let i=0;i<_uid.length;i++){h=((h<<5)-h)+_uid.charCodeAt(i);h|=0;}
  return Math.abs(h).toString(36).toUpperCase().slice(0,6);
}

async function addFriend(){
  const code=prompt('친구의 공유 코드를 입력해:');
  if(!code||!code.trim())return;
  const trimmed=code.trim().toUpperCase();
  if(!_uid){alert('로그인이 필요해요!');return;}
  // Find user by share code — search in Firestore
  try{
    const snap=await db.collection('users').where('shareCode','==',trimmed).get();
    if(snap.empty){alert('해당 코드의 사용자를 찾을 수 없어요');return;}
    const friendDoc=snap.docs[0];
    const friendUid=friendDoc.id;
    if(friendUid===_uid){alert('자기 자신은 추가할 수 없어!');return;}
    const friends=getFriends();
    if(friends.find(f=>f.uid===friendUid)){alert('이미 추가된 친구야!');return;}
    const fd=friendDoc.data();
    friends.push({uid:friendUid,code:trimmed,name:fd.displayName||'친구'});
    saveFriends(friends);
    // Save my share code to Firestore if not already
    await db.collection('users').doc(_uid).update({shareCode:getMyShareCode()});
    renderFriendPanel();
  }catch(e){alert('에러: '+e.message);}
}

    const today=todayStr();
    await db.collection('users').doc(friendUid).update({
      guestbook:firebase.firestore.FieldValue.arrayUnion({from:myName,text,date:today,time:pad(new Date().getHours())+':'+pad(new Date().getMinutes()),ts:Date.now()})

// ====== NUDGE SYSTEM ======
let _nudgeShown={};
function checkNudges(){
  if(viewDate!==todayStr())return;
  const now=new Date();const nh=now.getHours()+now.getMinutes()/60;
  const today=todayStr();
  const allB=blocks.filter(b=>b.date===today&&!b.isBuf&&!b.done&&(b.type==='timeline'||!b.type));
  const recurB=generateRecurringBlocks(today).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===today));
  [...allB,...recurB].forEach(b=>{
    const key=b.id||b.recurId;
    // Start nudge: block starts now (within 1 min)
    if(Math.abs(nh-b.startHour)<0.02&&!_nudgeShown['s_'+key]){
      _nudgeShown['s_'+key]=true;
      showNudge('⏰ <b>'+b.name+'</b> 시작할 시간이야! 일단 준비만 해볼까?');
    }
    // End nudge: 10min before end
    const endH=b.startHour+b.durHour;
    const minsBefore=(endH-nh)*60;
    if(minsBefore>8&&minsBefore<12&&!_nudgeShown['e_'+key]){
      _nudgeShown['e_'+key]=true;
      showNudge('⏳ <b>'+b.name+'</b> 10분 남았어. 마무리 준비!');
    }
  });
}
function showNudge(msg){
  const bar=document.getElementById('nudge-bar');if(!bar)return;
  bar.innerHTML=msg+'<button onclick="this.parentElement.style.display=\'none\'" style="margin-left:8px;background:none;border:none;color:var(--pd);cursor:pointer;font-size:14px">✕</button>';
  bar.style.display='block';
  setTimeout(()=>{bar.style.display='none';},15000);
}
setInterval(checkNudges,30000);
setTimeout(checkNudges,3000);

function showMiniToast(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) scale(.9);background:var(--pd);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:1000;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap';
  el.textContent=msg;document.body.appendChild(el);
  requestAnimationFrame(()=>{el.style.opacity='1';el.style.transform='translateX(-50%) scale(1)';});
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(-50%) scale(.9)';setTimeout(()=>el.remove(),200);},1500);
}

// ====== CYCLE TRACKER ======
function getCycleData(){try{return JSON.parse(localStorage.getItem('ff_cycle')||'null');}catch{return null;}}
function saveCycleData(d){localStorage.setItem('ff_cycle',JSON.stringify(d));}
function setCycleStart(){
  const today=todayStr();
  const input=prompt('생리 시작일 (YYYY-MM-DD)',today);
  if(!input||!/^\d{4}-\d{2}-\d{2}$/.test(input.trim()))return;
  const data=getCycleData()||{starts:[],avgCycle:28};
  data.starts.push(input.trim());
  data.starts.sort();
  // Calculate average cycle from history
  if(data.starts.length>=2){
    let total=0,count=0;
    for(let i=1;i<data.starts.length;i++){
      const diff=Math.round((new Date(data.starts[i])-new Date(data.starts[i-1]))/(86400000));
      if(diff>20&&diff<45){total+=diff;count++;}
    }
    if(count>0)data.avgCycle=Math.round(total/count);
  }
  saveCycleData(data);
  loadCycleBar();
  const info=document.getElementById('cycle-info');
  if(info)info.textContent='마지막 시작일: '+input.trim()+' | 평균 주기: '+data.avgCycle+'일';
}
function clearCycle(){localStorage.removeItem('ff_cycle');document.getElementById('cycle-bar').style.display='none';}

function getCyclePhaseForDate(ds){
  const data=getCycleData();if(!data||!data.starts.length)return null;
  const lastStart=data.starts[data.starts.length-1];
  const daysSince=Math.round((new Date(ds)-new Date(lastStart))/86400000)+1;
  const cycleDay=((daysSince-1)%data.avgCycle)+1;
  if(cycleDay>=1&&cycleDay<=5)return{type:'period',emoji:'🩸',label:'생리',cycleDay};
  if(cycleDay>=data.avgCycle-4)return{type:'pms',emoji:'⚠️',label:'PMS',cycleDay};
  return null;
}

function loadCycleBar(){
  const bar=document.getElementById('cycle-bar');if(!bar)return;
  const phase=getCyclePhaseForDate(todayStr());
  if(!phase){
    // Check if PMS/period coming soon
    const data=getCycleData();if(!data||!data.starts.length){bar.style.display='none';return;}
    const lastStart=data.starts[data.starts.length-1];
    const daysSince=Math.round((new Date(todayStr())-new Date(lastStart))/86400000)+1;
    const cycleDay=((daysSince-1)%data.avgCycle)+1;
    const daysUntilPeriod=data.avgCycle-cycleDay+1;
    if(daysUntilPeriod<=7){
      bar.style.background='#FFF3E0';bar.style.color='#B8720A';
      bar.innerHTML='📅 생리 예정 <b>'+daysUntilPeriod+'일 전</b> — 컨디션 변화에 주의하세요';
      bar.style.display='block';
    }else{bar.style.display='none';}
    return;
  }
  if(phase.type==='period'){
    bar.style.background='#F8D0D0';bar.style.color='#C45A78';
    bar.innerHTML='🩸 <b>생리 '+phase.cycleDay+'일차</b> — 무리하지 마. 가벼운 일 위주로 해도 충분해!';
  }else{
    bar.style.background='#FFF3E0';bar.style.color='#B8720A';
    bar.innerHTML='⚠️ <b>PMS 기간</b> — 컨디션 관리 기간. 하나만 해도 괜찮아 💛';
  }
  bar.style.display='block';
}
setTimeout(loadCycleBar,1200);

// ====== WEEKLY VIEW ======
function getWeekStart(){
  const d=new Date();const day=d.getDay()||7;
  d.setDate(d.getDate()-(day-1));d.setHours(0,0,0,0);return d;
}
function renderWeek(){
  const wrap=document.getElementById('week-content');if(!wrap)return;
  const weekStart=getWeekStart();
  const days=[];for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);days.push(d);}
  const today=todayStr();
  const dayLabels=['월','화','수','목','금','토','일'];
  let h='<div class="week-grid">';
  // Header row
  h+='<div class="week-header"></div>';
  days.forEach((d,i)=>{
    const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    const isToday=ds===today;
    h+='<div class="week-header'+(isToday?' today':'')+'">'+ dayLabels[i]+'<br>'+d.getDate()+'</div>';
  });
  // Time rows
  for(let t=START;t<START+HOURS;t++){
    h+='<div class="week-time">'+t+':00</div>';
    days.forEach((d,di)=>{
      const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      h+='<div class="week-cell" data-weekday="'+di+'" data-hour="'+t+'" data-date="'+ds+'">';
      // Find blocks at this hour
      const dayBlocks=blocks.filter(b=>b.date===ds&&!b.isBuf&&(b.type==='timeline'||!b.type));
      const recurBlocks=generateRecurringBlocks(ds).filter(rb=>!blocks.some(b=>b.recurDoneId===rb.recurId&&b.date===ds));
      const allB=[...dayBlocks,...recurBlocks];
      allB.forEach(b=>{
        if(Math.floor(b.startHour)===t){
          const top=Math.round((b.startHour-t)*28);
          const height=Math.max(Math.round(b.durHour*28),14);
          h+='<div class="week-block'+(b.done?' done':'')+'" style="top:'+top+'px;height:'+height+'px;background:'+getCatColorOrTheme(b)+'" onclick="viewDate=\''+ds+'\';switchView(\'tl\')" title="'+b.name+' '+fmtH(b.startHour)+'-'+fmtH(b.startHour+b.durHour)+'">'+b.name+'</div>';
        }
      });
      h+='</div>';
    });
  }
  h+='</div>';
  wrap.innerHTML=h;
}
function getCatColorOrTheme(b){
  if(b.category){const c=catColor(b.category);if(c&&c!=='#aaa')return c;}
  return'var(--pink)';
}

function dateToJDN(y,m,d){const a=Math.floor((14-m)/12);const yy=y+4800-a;const mm=m+12*a-3;return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;}
function getDayStem(y,m,d){const jdn=dateToJDN(y,m,d);return(jdn+49)%60%10;}
function getDayBranch(y,m,d){const jdn=dateToJDN(y,m,d);return(jdn+49)%60%12;}

function sajuRelation(myStemIdx,todayStemIdx){
  const myElem=Math.floor(myStemIdx/2);const todayElem=Math.floor(todayStemIdx/2);
  // 0=木,1=火,2=土,3=金,4=水
  if(myElem===todayElem)return'비겁';
  const gen=[[1],[2],[3],[4],[0]]; // 木→火,火→土,土→金,金→水,水→木
  const over=[[2],[3],[4],[0],[1]]; // 木→土,火→金,土→水,金→木,水→火
  if(gen[myElem][0]===todayElem)return'식상';
  if(over[myElem][0]===todayElem)return'재성';
  if(gen[todayElem]&&gen[todayElem][0]===myElem)return'인성';
  return'관성';
}

function loadSajuFortune(){
  const bday=localStorage.getItem('ff_birthday');
  if(!bday)return'';
  const[m,d]=bday.split('-').map(Number);
  // Need birth year for accurate calculation - use stored or estimate
  const byear=parseInt(localStorage.getItem('ff_birthyear')||'0');
  if(!byear)return'';
  const myStem=getDayStem(byear,m,d);
  const now=new Date();
  const todayStem=getDayStem(now.getFullYear(),now.getMonth()+1,now.getDate());
  const todayBranch=getDayBranch(now.getFullYear(),now.getMonth()+1,now.getDate());
  const rel=sajuRelation(myStem,todayStem);
  const myElem=ELEM5[myStem];
  const todayElem=ELEM5[todayStem];
  const seed=(now.getFullYear()*1000+now.getMonth()*100+now.getDate()+myStem)%4;
  const msg=SAJU_MSGS[rel][seed%SAJU_MSGS[rel].length];
  return'🔮 <b>'+STEMS_KO[myStem]+ELEM5_KO[myStem]+'일간</b> '+ELEM5_EMOJI[todayElem]+' 오늘('+STEMS_KO[todayStem]+BRANCHES_KO[todayBranch]+') '+rel+'의 날<br><span style="font-size:13px">'+msg+'</span>';
}

function showOnboarding(){
  if(localStorage.getItem('ff_onboarded'))return;
  const steps=[
    {sel:'.header h1',title:'Focus Flow',desc:'ADHD를 위한 집중 플래너에 오신 걸 환영해요!',pos:'bottom'},
    {sel:'#vtl',title:'일간 타임라인',desc:'하루를 시간 블록으로 관리해요. 블록을 드래그해서 이동할 수 있어요',pos:'bottom'},
    {sel:'#fab-btn',title:'할일 추가',desc:'"보고서 내일 14시 1시간" 이렇게 입력하면 바로 추가돼요',pos:'top'},
    {sel:'.view-tabs',title:'탭 전환',desc:'드롭, 주간, 습관, 목표, 분석 등 다양한 뷰를 사용해보세요. 드래그로 순서도 바꿀 수 있어요',pos:'bottom'},
    {sel:'.clock',title:'설정',desc:'⚙️ 톱니바퀴를 누르면 테마, 친구, 타임라인 범위 등을 설정할 수 있어요',pos:'bottom'},
  ];
  let idx=0;
  function renderStep(){
    const s=steps[idx];
    const target=document.querySelector(s.sel);
    const el=document.getElementById('onboarding');
    const isLast=idx===steps.length-1;
    if(!target){idx++;if(idx>=steps.length){skipOnboarding();}else{renderStep();}return;}
    const rect=target.getBoundingClientRect();
    // Highlight target
    target.style.position='relative';target.style.zIndex='9002';target.style.boxShadow='0 0 0 4px var(--pink), 0 0 20px rgba(0,0,0,.3)';target.style.borderRadius='12px';
    // Tooltip position
    const isTop=s.pos==='top';
    const tipTop=isTop?rect.top-130:rect.bottom+12;
    const tipLeft=Math.max(10,Math.min(rect.left,window.innerWidth-280));
    el.innerHTML='<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9001" onclick="nextOnboarding()"></div>'+
      '<div style="position:fixed;top:'+tipTop+'px;left:'+tipLeft+'px;width:260px;background:#fff;border-radius:16px;padding:16px;z-index:9003;box-shadow:0 8px 30px rgba(0,0,0,.2)">'+
      '<div style="font-size:14px;font-weight:700;color:var(--pd);margin-bottom:6px">'+s.title+'</div>'+
      '<div style="font-size:12px;color:#666;line-height:1.5;margin-bottom:12px">'+s.desc+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<div style="display:flex;gap:4px">'+steps.map((_,i)=>'<div style="width:6px;height:6px;border-radius:50%;background:'+(i===idx?'var(--pink)':'#ddd')+'"></div>').join('')+'</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
      '<span onclick="skipOnboarding()" style="font-size:11px;color:#aaa;cursor:pointer">건너뛰기</span>'+
      '<button onclick="nextOnboarding()" style="padding:6px 16px;border-radius:8px;border:none;background:var(--pink);color:#fff;font-size:12px;font-weight:600;cursor:pointer">'+(isLast?'시작!':'다음')+'</button>'+
      '</div></div></div>';
  }
  function clearHighlight(){
    steps.forEach(s=>{const t=document.querySelector(s.sel);if(t){t.style.zIndex='';t.style.boxShadow='';t.style.borderRadius='';}});
  }
  window.nextOnboarding=function(){clearHighlight();idx++;if(idx>=steps.length){skipOnboarding();}else{renderStep();}};
  window.skipOnboarding=function(){clearHighlight();localStorage.setItem('ff_onboarded','1');document.getElementById('onboarding').innerHTML='';};
  renderStep();
}

// Tab drag reorder
let _tabDragKey=null;
document.addEventListener('dragstart',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(!tab)return;
  _tabDragKey=tab.dataset.tabKey;
  e.dataTransfer.effectAllowed='move';
  tab.style.opacity='0.4';
});
document.addEventListener('dragend',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(tab)tab.style.opacity='1';
  document.querySelectorAll('.vtab.drag-over-tab').forEach(el=>el.classList.remove('drag-over-tab'));
  _tabDragKey=null;
});
document.addEventListener('dragover',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(!tab||!_tabDragKey)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.vtab.drag-over-tab').forEach(el=>el.classList.remove('drag-over-tab'));
  tab.classList.add('drag-over-tab');
});
document.addEventListener('drop',function(e){
  const tab=e.target.closest('[data-tab-key]');
  if(!tab||!_tabDragKey)return;
  e.preventDefault();
  const toKey=tab.dataset.tabKey;
  if(_tabDragKey===toKey)return;
  const order=getTabOrder();
  const fromIdx=order.indexOf(_tabDragKey);
  const toIdx=order.indexOf(toKey);
  if(fromIdx<0||toIdx<0)return;
  order.splice(fromIdx,1);
  order.splice(toIdx,0,_tabDragKey);
  saveTabOrder(order);
  renderViewTabs();
  _tabDragKey=null;
});
renderViewTabs();

function applyTheme(name){
  const t=THEMES[name];if(!t)return;
  document.documentElement.style.setProperty('--pink',t.pink);
  if(t.pt)document.documentElement.style.setProperty('--pt',t.pt);
  document.documentElement.style.setProperty('--pl',t.pl);
  document.documentElement.style.setProperty('--pd',t.pd);
  document.documentElement.style.setProperty('--pm',t.pink);
  localStorage.setItem('ff_theme',name);
  document.getElementById('theme-popup').style.display='none';
  // Update status bar color
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute('content',t.pink);
  document.body.style.background=t.pl;
  document.documentElement.style.background=t.pink;

function showDone(blockId){
  _lastDoneBlockId=blockId||null;
  const msg=MSGS[Math.floor(Math.random()*MSGS.length)];
  showToastWithEnergy(msg.e,msg.m,msg.s);
  const cc=getCC();
  for(let i=0;i<80;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;particles.push({x:window.innerWidth/2,y:window.innerHeight*.4,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,size:4+Math.random()*6,color:cc[Math.floor(Math.random()*cc.length)],rot:Math.random()*360,rotV:(Math.random()-.5)*8,life:1,decay:.013+Math.random()*.01,shape:Math.random()>.5?'rect':'circle'});}

function showToastWithEnergy(e,m,s){

  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);

  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);

let raf=null;
function animC(){
  if(raf)cancelAnimationFrame(raf);ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.vx*=.99;p.rot+=p.rotV;p.life-=p.decay;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);p.shape==='rect'?ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2):(ctx.beginPath(),ctx.arc(0,0,p.size/2,0,Math.PI*2),ctx.fill());ctx.restore();}
  if(particles.length)raf=requestAnimationFrame(animC);else ctx.clearRect(0,0,canvas.width,canvas.height);
}

let habits=JSON.parse(localStorage.getItem('ff_habits')||'[]');
let habitLogs=JSON.parse(localStorage.getItem('ff_habitLogs')||'{}');
let metrics=JSON.parse(localStorage.getItem('ff_metrics')||'[]');
let metricLogs=JSON.parse(localStorage.getItem('ff_metricLogs')||'{}');

function saveHabitLocal(){
  localStorage.setItem('ff_habits',JSON.stringify(habits));
  localStorage.setItem('ff_habitLogs',JSON.stringify(habitLogs));
  localStorage.setItem('ff_metrics',JSON.stringify(metrics));
  localStorage.setItem('ff_metricLogs',JSON.stringify(metricLogs));
}
function saveHabits(){saveHabitLocal();saveToFirestore();}

function addHabit(name){
  if(!name.trim())return;
  habits.push({id:Date.now(),name:name.trim(),createdAt:todayStr()});
  saveHabits();renderHabits();
}
function delHabit(id){
  habits=habits.filter(h=>h.id!==id);
  saveHabits();renderHabits();
}
function toggleHabitLog(habitId,dateStr){
  if(!habitLogs[dateStr])habitLogs[dateStr]={};
  habitLogs[dateStr][habitId]=!habitLogs[dateStr][habitId];
  saveHabits();renderHabits();
}
function getHabitStreak(habitId){
  let streak=0,d=todayStr();
  for(let i=0;i<365;i++){
    if(habitLogs[d]&&habitLogs[d][habitId]){streak++;d=addDays(d,-1);}
    else break;
  }
  return streak;
}
function getWeekDates(){
  const today=new Date(todayStr()+'T12:00:00');
  const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  return dates;
}
function getMonthDates(){
  const today=new Date(todayStr()+'T12:00:00');
  const y=today.getFullYear(),m=today.getMonth();
  const first=new Date(y,m,1);
  const fdow=first.getDay();
  const startOff=fdow===0?6:fdow-1;
  const start=new Date(first);start.setDate(first.getDate()-startOff);
  const dim=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((startOff+dim)/7)*7;
  const dates=[];
  for(let i=0;i<totalCells;i++){const d=new Date(start);d.setDate(start.getDate()+i);dates.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  return dates;
}

function addMetric(name,unit){
  if(!name.trim())return;
  metrics.push({id:Date.now(),name:name.trim(),unit:(unit||'').trim()});
  saveHabits();renderHabits();
}
function delMetric(id){
  metrics=metrics.filter(m=>m.id!==id);
  saveHabits();renderHabits();
}
function saveMetricVal(metricId,dateStr,val){
  if(!metricLogs[dateStr])metricLogs[dateStr]={};
  const n=parseFloat(val);
  if(isNaN(n)){delete metricLogs[dateStr][metricId];}
  else{metricLogs[dateStr][metricId]=n;}
  saveHabits();renderHabits();
}
function getMetricLast14(metricId){
  const vals=[];
  let d=todayStr();
  for(let i=0;i<14;i++){
    const v=(metricLogs[d]&&metricLogs[d][metricId]!==undefined)?metricLogs[d][metricId]:null;
    vals.unshift({date:d,val:v});
    d=addDays(d,-1);
  }
  return vals;
}

function renderHabits(){
  const wrap=document.getElementById('habit-content');
  const today=todayStr();
  const weekDates=getWeekDates();
  const weekDayLabels=['월','화','수','목','금','토','일'];
  let h='';

  // Habit add
  h+='<div class="habit-section-title">습관 관리</div>';
  h+='<div class="habit-input-row">';
  h+='<input class="habit-input" id="habit-quick-input" placeholder="새 습관 추가... (Enter)" onkeydown="if(event.key===\'Enter\'&&!event.isComposing){addHabit(this.value);this.value=\'\';}">';
  h+='<button class="habit-add-btn" onclick="const i=document.getElementById(\'habit-quick-input\');addHabit(i.value);i.value=\'\';">+</button>';
  h+='</div>';

  // Habit list
  if(habits.length){
    habits.forEach(hab=>{
      const checked=habitLogs[today]&&habitLogs[today][hab.id];
      const streak=getHabitStreak(hab.id);
      h+='<div class="habit-item">';
      h+='<div class="habit-top">';
      h+='<button class="habit-check'+(checked?' checked':'')+'" onclick="toggleHabitLog('+hab.id+',\''+today+'\')">'+(checked?'&#10003;':'')+'</button>';
      h+='<span class="habit-name">'+hab.name+'</span>';
      if(streak>0) h+='<span class="habit-streak">&#128293; '+streak+'일 연속</span>';
      h+='<button class="habit-del" onclick="delHabit('+hab.id+')">&#128465;</button>';
      h+='</div>';
      // Week view
      h+='<div class="habit-week">';
      weekDates.forEach((wd,i)=>{
        const filled=habitLogs[wd]&&habitLogs[wd][hab.id];
        h+='<div style="display:flex;flex-direction:column;align-items:center;gap:1px">';
        h+='<div class="habit-week-label">'+weekDayLabels[i]+'</div>';
        h+='<div class="habit-week-cell'+(filled?' filled':'')+'" onclick="toggleHabitLog('+hab.id+',\''+wd+'\')" style="cursor:pointer"></div>';
        h+='</div>';
      });
      h+='</div>';
      h+='</div>';
    });
  }else{
    h+='<div style="text-align:center;color:#ccc;font-size:13px;padding:20px 0">아직 등록된 습관이 없어</div>';
  }

  // ===== 66일 챌린지 =====
  if(habits.length){
    h+='<div style="margin-top:16px;padding:14px;background:linear-gradient(135deg,var(--pl),#fff);border-radius:14px;border:1.5px solid var(--pink)">';
    h+='<div style="font-size:14px;font-weight:700;color:var(--pd);margin-bottom:10px">🏆 66일 챌린지 (주 5회 = 성공)</div>';
    habits.forEach(hab=>{
      const created=hab.createdAt||todayStr();
      const startDate=new Date(created+'T12:00:00');
      const now=new Date(todayStr()+'T12:00:00');
      const daysPassed=Math.max(0,Math.floor((now-startDate)/86400000));
      const totalDays=66;
      const progress=Math.min(daysPassed,totalDays);

      // Count weeks and success weeks (5+ days per week)
      let totalWeeks=Math.ceil(progress/7)||1;
      let successWeeks=0;
      let totalChecked=0;
      for(let w=0;w<totalWeeks;w++){
        let weekCount=0;
        for(let d=0;d<7;d++){
          const dayOffset=w*7+d;
          if(dayOffset>=progress)break;
          const dateStr=addDays(created,dayOffset);
          if(habitLogs[dateStr]&&habitLogs[dateStr][hab.id])weekCount++;
        }
        if(weekCount>=5)successWeeks++;
        totalChecked+=weekCount;
      }

      const pct=Math.round(progress/totalDays*100);
      const done=progress>=totalDays;

      // Flower growth system
      const FLOWERS=['🌱','🌿','☘️','🌷','🌸','🌺','💐'];
      // Net growth: +1 per success week, -1 per fail week
      let flowerLevel=0;
      for(let w=0;w<totalWeeks;w++){
        let wc=0;
        for(let d=0;d<7;d++){
          const off=w*7+d;if(off>=progress)break;
          const ds=addDays(created,off);
          if(habitLogs[ds]&&habitLogs[ds][hab.id])wc++;
        }
        if(wc>=5)flowerLevel=Math.min(flowerLevel+1,FLOWERS.length-1);
        else if(wc<3)flowerLevel=Math.max(flowerLevel-1,0);
      }
      if(done)flowerLevel=FLOWERS.length-1;
      const flower=FLOWERS[flowerLevel];
      const flowerName=['씨앗','새싹','줄기','봉오리','개화','만개','완성!'][flowerLevel];

      // Flower display
      h+='<div style="margin-bottom:12px">';
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      h+='<div style="font-size:12px;font-weight:600;color:#555">'+hab.name+'</div>';
      h+='<div style="font-size:36px;line-height:1;transition:all .3s" id="flower-'+hab.id+'">'+flower+'</div>';
      h+='<div style="font-size:11px;color:var(--pd);font-weight:600">'+flowerName+'</div>';
      if(done)h+='<div style="font-size:11px;color:#1D9E75;font-weight:700">✅ 66일 달성!</div>';
      h+='</div>';

      // Flower stage indicator
      h+='<div style="display:flex;gap:4px;margin-bottom:8px;align-items:center">';
      FLOWERS.forEach((f,i)=>{
        const active=i<=flowerLevel;
        h+='<div style="font-size:'+(i===flowerLevel?'20px':'14px')+';opacity:'+(active?'1':'0.25')+';transition:all .3s'+(i===flowerLevel?';transform:scale(1.2)':'')+'">'+f+'</div>';
        if(i<FLOWERS.length-1)h+='<div style="width:8px;height:2px;background:'+(i<flowerLevel?'var(--pd)':'var(--pl)')+';border-radius:1px"></div>';
      });
      h+='</div>';

      // 66-day grid (dots)
      h+='<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px">';
      for(let i=0;i<totalDays;i++){
        const dateStr=addDays(created,i);
        const checked=habitLogs[dateStr]&&habitLogs[dateStr][hab.id];
        const isPast=i<progress;
        const isToday=i===daysPassed;
        if(checked){
          h+='<div style="width:14px;height:14px;font-size:10px;line-height:14px;text-align:center" title="Day '+(i+1)+'">🌸</div>';
        }else if(isToday){
          h+='<div style="width:14px;height:14px;border-radius:7px;background:var(--pink);font-size:7px;line-height:14px;text-align:center;color:#fff" title="오늘">♡</div>';
        }else{
          h+='<div style="width:14px;height:14px;border-radius:7px;background:'+(isPast?'var(--pink)':'var(--pl)')+';opacity:'+(isPast?'0.3':'1')+'" title="Day '+(i+1)+'"></div>';
        }
      }
      h+='</div>';
      // Progress bar
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<div style="flex:1;height:6px;background:var(--pl);border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--pd);border-radius:3px"></div></div>';
      h+='<span style="font-size:11px;color:var(--pd);font-weight:600;white-space:nowrap">'+progress+'/'+totalDays+'일</span>';
      h+='</div>';
      h+='<div style="font-size:10px;color:#999;margin-top:4px">성공 주: '+successWeeks+'/'+totalWeeks+'주 · 총 '+totalChecked+'일 체크</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // ===== METRICS SECTION (hidden) =====
  h+='<div class="metrics-section" style="display:none">';
  h+='<div class="habit-section-title">기록 (Metrics)</div>';
  h+='<div class="metric-add-row">';
  h+='<input id="metric-name-input" placeholder="이름 (몸무게, 수면...)">';
  h+='<input id="metric-unit-input" placeholder="단위 (kg, h...)" style="max-width:80px">';
  h+='<button class="metric-add-btn" onclick="const n=document.getElementById(\'metric-name-input\'),u=document.getElementById(\'metric-unit-input\');addMetric(n.value,u.value);n.value=\'\';u.value=\'\';">추가</button>';
  h+='</div>';

  if(metrics.length){
    metrics.forEach(met=>{
      const todayVal=(metricLogs[today]&&metricLogs[today][met.id]!==undefined)?metricLogs[today][met.id]:'';
      const last14=getMetricLast14(met.id);
      const vals14=last14.filter(x=>x.val!==null).map(x=>x.val);
      const maxVal=vals14.length?Math.max(...vals14):1;
      const minVal=vals14.length?Math.min(...vals14):0;
      const range=maxVal-minVal||1;

      // This week avg vs last week avg
      let thisWeek=[],lastWeek=[];
      for(let i=0;i<7;i++){
        const d1=addDays(today,-i),d2=addDays(today,-i-7);
        if(metricLogs[d1]&&metricLogs[d1][met.id]!==undefined)thisWeek.push(metricLogs[d1][met.id]);
        if(metricLogs[d2]&&metricLogs[d2][met.id]!==undefined)lastWeek.push(metricLogs[d2][met.id]);
      }
      const twAvg=thisWeek.length?(thisWeek.reduce((a,b)=>a+b,0)/thisWeek.length):null;
      const lwAvg=lastWeek.length?(lastWeek.reduce((a,b)=>a+b,0)/lastWeek.length):null;

      h+='<div class="metric-item">';
      h+='<div class="metric-top">';
      h+='<span class="metric-label">'+met.name+'</span>';
      if(met.unit) h+='<span class="metric-unit">'+met.unit+'</span>';
      h+='<button class="metric-del" onclick="delMetric('+met.id+')">&#128465;</button>';
      h+='</div>';
      h+='<div class="metric-input-row">';
      h+='<span style="font-size:12px;color:#aaa">오늘:</span>';
      h+='<input class="metric-val-input" id="metric-val-'+met.id+'" type="number" step="any" value="'+todayVal+'" placeholder="입력">';
      h+='<button class="metric-save-btn" onclick="saveMetricVal('+met.id+',\''+today+'\',document.getElementById(\'metric-val-'+met.id+'\').value)">저장</button>';
      h+='</div>';

      // Summary
      if(twAvg!==null){
        let sumText='이번 주 평균 '+Math.round(twAvg*10)/10+(met.unit?' '+met.unit:'');
        if(lwAvg!==null){
          const diff=Math.round((twAvg-lwAvg)*10)/10;
          sumText+=' (지난주 대비 '+(diff>=0?'+':'')+diff+')';
        }
        h+='<div class="metric-summary">'+sumText+'</div>';
      }

      // Bar chart
      h+='<div class="metric-chart">';
      last14.forEach(item=>{
        const barH=item.val!==null?Math.max(4,((item.val-minVal)/range)*40+4):2;
        const dayLabel=item.date.slice(8);
        h+='<div class="metric-bar-wrap">';
        if(item.val!==null) h+='<div class="metric-bar-val">'+Math.round(item.val*10)/10+'</div>';
        h+='<div class="metric-bar'+(item.val===null?' empty':'')+'" style="height:'+barH+'px"></div>';
        h+='<div class="metric-bar-label">'+parseInt(dayLabel)+'</div>';
        h+='</div>';
      });
      h+='</div>';
      h+='</div>';
    });
  }else{
    h+='<div style="text-align:center;color:#ccc;font-size:13px;padding:20px 0">아직 등록된 기록이 없어</div>';
  }
  h+='</div>';

  // ===== Quick Memo (빠른 메모) =====
  h+='<div style="margin-top:16px;padding:14px;background:var(--pl);border-radius:14px;border:1.5px solid var(--pink)">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--pd);margin-bottom:10px">📝 메모</div>';
  h+='<textarea id="quick-memo-textarea" placeholder="자유롭게 메모하세요..." style="width:100%;min-height:80px;border:1.5px solid var(--pink);border-radius:10px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;background:#fff;color:#333" onblur="saveQuickMemo()" oninput="saveQuickMemoDebounced()">'+(_quickMemo||'')+'</textarea>';
  h+='</div>';

  wrap.innerHTML=h;
}

let _quickMemo=localStorage.getItem('ff_quickMemo')||'';
let _quickMemoTimer=null;
function saveQuickMemo(){
  const el=document.getElementById('quick-memo-textarea');
  if(!el)return;
  _quickMemo=el.value;
  localStorage.setItem('ff_quickMemo',_quickMemo);
  if(!_uid)return;
  _skipRemote=true;
  db.collection('users').doc(_uid).set({quickMemo:_quickMemo},{merge:true}).then(()=>{
    setTimeout(()=>{_skipRemote=false},1000);
  });
}
function saveQuickMemoDebounced(){
  clearTimeout(_quickMemoTimer);
  _quickMemoTimer=setTimeout(saveQuickMemo,1500);
}

let pomoRunning=false;
let pomoInterval=null;
let pomoPhase='work'; // 'work' or 'break'
let pomoTodayCount=0;
let pomoCountDate=todayStr();

// Load pomodoro count from localStorage (Firebase sync handled separately)
(function loadPomoLocal(){
  const saved=JSON.parse(localStorage.getItem('ff_pomo')||'{}');
  if(saved.date===todayStr()){
    pomoTodayCount=saved.count||0;
  }
  pomoCountDate=todayStr();
})();

function savePomoLocal(){
  localStorage.setItem('ff_pomo',JSON.stringify({date:pomoCountDate,count:pomoTodayCount}));
}

function savePomoToFirestore(){
  if(!_uid)return;
  const dateKey='pomo_'+todayStr().replace(/-/g,'');
  const obj={};
  obj['pomodoroCount.'+todayStr()]=pomoTodayCount;
  _skipRemote=true;
  db.collection('users').doc(_uid).set(obj,{merge:true}).then(()=>{
    setTimeout(()=>{_skipRemote=false},1000);
  });
}

function togglePomoPanel(){
  const panel=document.getElementById('pomo-panel');
  panel.classList.toggle('show');
  updatePomoDisplay();
}

function updatePomoDisplay(){
  const m=Math.floor(pomoSeconds/60);
  const s=pomoSeconds%60;
  document.getElementById('pomo-time').textContent=pad(m)+':'+pad(s);
  document.getElementById('pomo-phase').textContent=pomoPhase==='work'?'집중 시간':'쉬는 시간';
  document.getElementById('pomo-start-btn').textContent=pomoRunning?'일시정지':'시작';

  const total=pomoPhase==='work'?POMO_WORK:POMO_BREAK;
  const pct=((total-pomoSeconds)/total)*100;
  document.getElementById('pomo-progress-bar').style.width=pct+'%';

  // Update gauge (desktop) — circular ring that drains as time passes
  const gauge=document.getElementById('pomo-gauge-fill');
  if(gauge){const circ=2*Math.PI*76;gauge.setAttribute('stroke-dashoffset',circ*(pct/100));}
  const gt=document.getElementById('pomo-gauge-time');if(gt)gt.textContent=pad(m)+':'+pad(s);
  const gp=document.getElementById('pomo-gauge-phase');if(gp)gp.textContent=pomoPhase==='work'?'집중 시간':'쉬는 시간';
  const ds=document.getElementById('pomo-desk-start');if(ds)ds.textContent=pomoRunning?'일시정지':'시작';

  // Update count display
  if(pomoCountDate!==todayStr()){pomoTodayCount=0;pomoCountDate=todayStr();savePomoLocal();}
  const countText='오늘 뽀모도로 '+pomoTodayCount+'회 완료 \uD83C\uDF45';
  document.getElementById('pomo-count').textContent=countText;
  const dc=document.getElementById('pomo-desk-count');if(dc)dc.textContent=countText;
}

function pomoStartPause(){
  if(pomoRunning){
    clearInterval(pomoInterval);
    pomoRunning=false;
  } else {
    pomoRunning=true;
    pomoInterval=setInterval(()=>{
      if(pomoSeconds<=0){
        clearInterval(pomoInterval);
        pomoRunning=false;
        pomoTimerDone();
        return;
      }
      pomoSeconds--;
      updatePomoDisplay();
    },1000);
  }
  updatePomoDisplay();
}

function pomoReset(){
  clearInterval(pomoInterval);
  pomoRunning=false;
  pomoPhase='work';
  pomoSeconds=POMO_WORK;
  updatePomoDisplay();
}

function pomoTimerDone(){
  // Play chime using Web Audio API
  try{
    const actx=new(window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99].forEach((freq,i)=>{
      const osc=actx.createOscillator();
      const gain=actx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.3,actx.currentTime+i*0.2);
      gain.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.2+0.5);
      osc.connect(gain);gain.connect(actx.destination);
      osc.start(actx.currentTime+i*0.2);
      osc.stop(actx.currentTime+i*0.2+0.5);
    });
  }catch(e){}

  if(pomoPhase==='work'){
    pomoTodayCount++;
    savePomoLocal();
    savePomoToFirestore();
    showToast('\uD83C\uDF45','뽀모도로 완료!','집중 잘했어! 잠깐 쉬자');
    // Start break
    pomoPhase='break';
    pomoSeconds=POMO_BREAK;
  } else {
    showToast('\uD83D\uDCAA','휴식 끝!','다시 집중해보자');
    pomoPhase='work';
    pomoSeconds=POMO_WORK;
  }
  updatePomoDisplay();
}

function addEmergencyTodo(text){

}

function toggleEmergencyDone(idx){
  if(idx<0||idx>=emergencyTodo.length)return;
  const was=emergencyTodo[idx].done;
  emergencyTodo[idx].done=!emergencyTodo[idx].done;
  saveEmergencyLocal();saveEmergencyToFirestore();renderInbox();

  if(!was&&emergencyTodo[idx].done){

      showToast('\uD83C\uDF81','보상 획득!',emergencyTodo[idx].reward+' 먹을 시간!');
